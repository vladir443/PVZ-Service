<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PVZ Service</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      :root {
        --bg: #f3f6fb;
        --card: #ffffff;
        --line: #e3eaf4;
        --text: #162033;
        --muted: #66748c;
        --primary: #0f3b75;
        --primary-dark: #0b2f5d;
        --danger: #b42318;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        color: var(--text);
        background: linear-gradient(180deg, #f8faff 0%, #f1f5fb 100%);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        overscroll-behavior-y: none;
      }

      body.modal-open {
        overflow: hidden;
        height: 100dvh;
      }

      body.theme-dark {
        --bg: #0d1422;
        --card: #111b2d;
        --line: #26344c;
        --text: #e8eef8;
        --muted: #9aaac2;
        --primary: #2f6ed6;
        --primary-dark: #2356ad;
        background: linear-gradient(180deg, #0a111d 0%, #0c1525 100%);
      }

      .wrap {
        max-width: none;
        margin: 0 auto;
        padding: 10px;
        min-height: 100dvh;
      }

      .card {
        background: var(--card);
        border-radius: 18px;
        padding: 16px;
        padding-bottom: 88px;
        border: 1px solid #e7edf7;
        box-shadow: 0 8px 26px rgba(22, 37, 63, 0.08);
        min-height: calc(100dvh - 20px);
      }

      body.theme-dark .card {
        border-color: #24354f;
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.42);
      }

      h1 { margin: 0; font-size: 24px; }
      h2 { margin: 0; font-size: 20px; letter-spacing: 0.01em; }

      .mt8 { margin-top: 8px; }
      .mt12 { margin-top: 12px; }
      .mt16 { margin-top: 16px; }

      .muted { color: var(--muted); }

      .row {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }

      .button {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 15px;
        cursor: pointer;
        color: #fff;
        background: var(--primary);
      }

      .button:hover { background: var(--primary-dark); }
      .button.secondary { background: #334155; }
      .button.danger { background: var(--danger); }
      .button.disabled,
      .button:disabled {
        background: #94a3b8;
        cursor: not-allowed;
      }

      .save-icon-wrap {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
      }

      .save-icon-btn {
        width: 38px;
        height: 38px;
        border: 1px solid #1e56a9;
        border-radius: 10px;
        background: linear-gradient(180deg, #2d74da 0%, #1f5db8 100%);
        display: grid;
        place-items: center;
        padding: 0;
        cursor: pointer;
      }

      .save-icon-btn:hover {
        background: linear-gradient(180deg, #2569cb 0%, #1a509f 100%);
      }

      .save-icon-btn:disabled {
        background: #94a3b8;
        border-color: #7f93b0;
        cursor: not-allowed;
      }

      .save-icon-btn img {
        width: 18px;
        height: 18px;
        object-fit: contain;
        filter: brightness(0) invert(1);
      }

      .save-feedback {
        min-height: 16px;
        font-size: 13px;
        line-height: 1.2;
        color: #1d9f60;
        opacity: 0;
        transition: opacity 0.18s ease;
      }

      .save-feedback.visible {
        opacity: 1;
      }

      .back-icon-btn {
        width: 42px;
        height: 42px;
        border: 1px solid #cfd7e3;
        border-radius: 12px;
        background: #fff;
        display: grid;
        place-items: center;
        padding: 0;
        cursor: pointer;
      }

      .back-icon-btn img {
        width: 20px;
        height: 20px;
        object-fit: contain;
      }

      .menu-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 8px;
      }

      .dash-user {
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 14px;
        align-items: center;
        border: 1px solid #dbe4f1;
        border-radius: 16px;
        padding: 14px;
        background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
        box-shadow: 0 4px 14px rgba(24, 44, 78, 0.06);
        cursor: pointer;
      }

      .dash-avatar {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid #e8eef7;
        display: grid;
        place-items: center;
        font-size: 34px;
        font-weight: 700;
        background: linear-gradient(145deg, #d8b4fe, #a855f7);
        color: #fff;
      }

      .dash-arrow {
        width: 18px;
        height: 18px;
        object-fit: contain;
        opacity: 0.65;
      }

      .dash-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #22c55e;
        display: inline-block;
      }

      .dash-dot.on {
        background: #22c55e;
      }

      .dash-dot.off {
        background: #ef4444;
      }

      .overview-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .overview-card {
        border: 1px solid #e2e9f4;
        border-radius: 16px;
        padding: 14px;
        background: #f8fbff;
        box-shadow: 0 3px 10px rgba(20, 37, 69, 0.04);
      }

      .overview-card h3 {
        margin: 0;
        font-size: 15px;
        font-weight: 700;
        line-height: 1.25;
      }

      .overview-card .big {
        margin-top: 10px;
        font-size: 28px;
        font-weight: 800;
        line-height: 1.1;
        letter-spacing: -0.02em;
      }

      .home-caption {
        margin-top: 10px;
        font-size: 13px;
        line-height: 1.45;
        color: var(--muted);
      }

      .home-list {
        margin-top: 10px;
        display: grid;
        gap: 7px;
      }

      .home-list-item {
        display: grid;
        grid-template-columns: 92px 1fr;
        gap: 8px;
        align-items: start;
      }

      .home-list-date {
        font-size: 13px;
        font-weight: 700;
        color: #273a57;
        white-space: nowrap;
        display: flex;
        align-items: baseline;
        gap: 5px;
      }

      .home-list-sep {
        color: #7b8aa2;
      }

      .home-list-address {
        font-size: 13px;
        color: #64748b;
        line-height: 1.35;
      }

      .brand-ozon {
        color: #2563eb;
        font-weight: 700;
      }

      .brand-wb {
        color: #7c3aed;
        font-weight: 700;
      }

      .home-main-note {
        margin-top: 8px;
        font-size: 14px;
        line-height: 1.35;
        color: #2a3f60;
        font-weight: 600;
      }

      .home-sub-note {
        margin-top: 6px;
        font-size: 13px;
        line-height: 1.35;
        color: #7a879d;
      }

      .overview-card.blue { background: #f1f6ff; }
      .overview-card.green { background: #f4f8ff; }
      .overview-card.purple { background: #f3f8ff; }

      .quick-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .quick-btn {
        border: 1px solid #d6deea;
        border-radius: 14px;
        background: #fff;
        padding: 12px 10px;
        color: #1f2937;
        cursor: pointer;
        text-align: center;
        font-size: 15px;
      }

      .warn-banner {
        border: 1px solid #e0e8f5;
        border-radius: 16px;
        background: #f7faff;
        padding: 14px;
      }

      .warn-banner > div:first-child {
        font-size: 15px;
        color: #243754;
      }

      body.theme-dark .warn-banner > div:first-child {
        color: var(--text);
      }

      .profile-hero {
        border-radius: 16px;
        padding: 16px;
        background: linear-gradient(120deg, #2563eb, #7c3aed);
        color: #fff;
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 12px;
        align-items: center;
      }

      .profile-hero .dash-avatar {
        width: 84px;
        height: 84px;
        border: 2px solid #fff;
      }

      .profile-badge {
        margin-top: 8px;
        display: inline-block;
        border: 1px solid #93c5fd;
        border-radius: 999px;
        padding: 4px 10px;
        background: rgba(255, 255, 255, 0.12);
      }

      .settings-list {
        border: 1px solid #d6deea;
        border-radius: 14px;
        background: #fff;
        overflow: hidden;
      }

      .settings-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        padding: 12px;
        border-bottom: 1px solid #e4eaf3;
      }

      .settings-row:last-child {
        border-bottom: 0;
      }

      .theme-switch {
        width: 68px;
        height: 34px;
        border: 1px solid #cdd8ea;
        border-radius: 999px;
        background: #eaf1fd;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        padding: 3px;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .theme-switch.dark {
        background: #253956;
        border-color: #375078;
        justify-content: flex-end;
      }

      .theme-switch-thumb {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: #fff;
        display: grid;
        place-items: center;
        box-shadow: 0 2px 6px rgba(15, 23, 42, 0.22);
      }

      .theme-switch-thumb img {
        width: 14px;
        height: 14px;
        object-fit: contain;
      }

      .reminder-toggle-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        border: 1px solid #d6deea;
        border-radius: 12px;
        padding: 12px;
        background: #f8fbff;
      }

      .inline-arrow {
        width: 14px;
        height: 14px;
        object-fit: contain;
      }

      .open-arrow-btn {
        width: 34px;
        height: 34px;
        border: 1px solid #cfd7e3;
        border-radius: 10px;
        background: #fff;
        display: grid;
        place-items: center;
        cursor: pointer;
        padding: 0;
      }

      .open-arrow-btn img {
        width: 14px;
        height: 14px;
        object-fit: contain;
      }

      .location-btn-inner {
        width: 100%;
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 12px;
      }

      .location-btn-title {
        font-size: 16px;
        font-weight: 700;
        line-height: 1.28;
        color: #1d2a3f;
      }

      .location-btn-arrow {
        width: 16px;
        height: 16px;
        object-fit: contain;
        filter: none;
        opacity: 0.45;
      }

      .bottom-nav {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 60;
        background: rgba(244, 248, 255, 0.96);
        backdrop-filter: blur(8px);
        border-top: 1px solid #dce5f3;
        padding: 7px 10px calc(7px + env(safe-area-inset-bottom));
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 6px;
      }

      .bottom-nav-btn {
        border: 0;
        border-radius: 12px;
        background: transparent;
        color: #74839b;
        font-size: 12px;
        font-weight: 500;
        padding: 4px 6px 3px;
        text-align: center;
        cursor: pointer;
        display: grid;
        justify-items: center;
        gap: 3px;
      }

      .bottom-nav-btn.active {
        color: #1f5cb8;
        background: #e9f1ff;
      }

      .bottom-nav-btn.disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .bottom-nav-icon {
        width: 20px;
        height: 20px;
        object-fit: contain;
        filter: brightness(0) saturate(100%) invert(42%) sepia(11%) saturate(647%)
          hue-rotate(173deg) brightness(94%) contrast(88%);
      }

      .bottom-nav-icon.employees {
        width: 24px;
        height: 24px;
      }

      .bottom-nav-btn.active .bottom-nav-icon {
        filter: brightness(0) saturate(100%) invert(28%) sepia(84%) saturate(1308%)
          hue-rotate(194deg) brightness(95%) contrast(92%);
      }

      .bottom-nav-label {
        line-height: 1.1;
        white-space: nowrap;
      }

      body.theme-dark .overview-card,
      body.theme-dark .warn-banner,
      body.theme-dark .settings-list,
      body.theme-dark .settings-row,
      body.theme-dark .reminder-toggle-row,
      body.theme-dark .panel,
      body.theme-dark .employee-row,
      body.theme-dark .location-btn,
      body.theme-dark .table-wrap,
      body.theme-dark .schedule-card,
      body.theme-dark .finance-row,
      body.theme-dark .finance-history-item,
      body.theme-dark .profile-box {
        background: #152238;
        border-color: #2a3d59;
        color: var(--text);
      }

      body.theme-dark .dash-user {
        background: linear-gradient(180deg, #152238 0%, #122034 100%);
        border-color: #2a3d59;
      }

      body.theme-dark .muted,
      body.theme-dark .home-list-address,
      body.theme-dark .home-sub-note,
      body.theme-dark .employee-contacts,
      body.theme-dark .employee-roleline {
        color: var(--muted);
      }

      body.theme-dark .home-list-date,
      body.theme-dark .home-main-note,
      body.theme-dark .location-btn-title,
      body.theme-dark .employee-name {
        color: var(--text);
      }

      body.theme-dark .brand-ozon {
        color: #60a5fa;
      }

      body.theme-dark .brand-wb {
        color: #c4b5fd;
      }

      body.theme-dark .bottom-nav {
        background: rgba(10, 17, 29, 0.95);
        border-top-color: #22334c;
      }

      body.theme-dark .bottom-nav-btn {
        color: #9eb0c8;
      }

      body.theme-dark .bottom-nav-btn.active {
        background: #1d2e49;
        color: #8db8ff;
      }

      body.theme-dark input[type="text"],
      body.theme-dark input[type="number"],
      body.theme-dark input[type="month"],
      body.theme-dark input[type="date"],
      body.theme-dark input[type="tel"],
      body.theme-dark input[type="time"],
      body.theme-dark select,
      body.theme-dark textarea {
        background: #0f1a2d;
        border-color: #334a6c;
        color: #e8eef8;
      }

      body.theme-dark .open-arrow-btn,
      body.theme-dark .icon-button,
      body.theme-dark .back-icon-btn,
      body.theme-dark .save-icon-btn {
        background: #1a2a43;
        border-color: #355077;
      }

      body.theme-dark .inline-arrow,
      body.theme-dark .open-arrow-btn img,
      body.theme-dark .location-btn-arrow,
      body.theme-dark .dash-arrow,
      body.theme-dark .back-icon-btn img {
        filter: brightness(0) invert(1);
        opacity: 0.95;
      }

      body.theme-dark .location-btn.wb {
        background: linear-gradient(180deg, #201b35 0%, #181f34 100%);
        border-left-color: #8b5cf6;
      }

      body.theme-dark .location-btn.ozon {
        background: linear-gradient(180deg, #14253f 0%, #162137 100%);
        border-left-color: #3b82f6;
      }

      body.theme-dark .add-employee-btn.icon-only,
      body.theme-dark .employee-edit-icon-btn,
      body.theme-dark .employee-contact-copy-btn {
        background: #1a2a43;
        border-color: #355077;
      }

      body.theme-dark .add-employee-btn.icon-only img,
      body.theme-dark .employee-edit-icon-btn img,
      body.theme-dark .employee-contact-copy-btn img {
        filter: brightness(0) invert(1);
        opacity: 0.95;
      }

      body.theme-dark .add-employee-btn.icon-only:hover,
      body.theme-dark .employee-edit-icon-btn:hover,
      body.theme-dark .employee-contact-copy-btn:hover {
        background: #203556;
        border-color: #466592;
      }

      body.theme-dark .employee-delete-btn {
        background: #7f1d1d;
        border-color: #b91c1c;
      }

      body.theme-dark .employee-delete-btn:hover {
        background: #991b1b;
        border-color: #dc2626;
      }

      body.theme-dark .employee-delete-btn:disabled {
        background: #1a2a43;
        border-color: #355077;
      }

      body.theme-dark .save-icon-btn:hover {
        background: #203556;
      }

      body.theme-dark .save-feedback {
        color: #6ee7b7;
      }

      body.theme-dark .security-revoke-all-btn {
        border-color: #3b5579;
        color: #d9e7fb;
      }

      body.theme-dark .security-revoke-all-btn:hover {
        background: #1f3352;
      }

      body.theme-dark .security-session-card {
        background: #142238;
        border-color: #2f4566;
        box-shadow: none;
      }

      body.theme-dark .security-session-card.current {
        background: linear-gradient(180deg, #142b2a 0%, #12243a 100%);
        border-color: #34745a;
      }

      body.theme-dark .security-session-icon {
        background: #1a2a43;
        border-color: #355077;
      }

      body.theme-dark .security-session-icon.desktop::before,
      body.theme-dark .security-session-icon.mobile::before {
        border-color: #9ec5ff;
      }

      body.theme-dark .security-session-icon.desktop::after,
      body.theme-dark .security-session-icon.mobile::after {
        background: #9ec5ff;
      }

      body.theme-dark .security-session-meta strong {
        color: #e8eef8;
      }

      body.theme-dark .security-session-revoke-btn {
        background: #172740;
        border-color: #3a5478;
        color: #e5edf8;
      }

      body.theme-dark .security-session-revoke-btn:hover {
        background: #203556;
      }

      body.theme-dark .admin-hours-card {
        background: #18263d;
        border-color: #2f4568;
      }

      body.theme-dark .pin-hero {
        background: linear-gradient(180deg, #15243b 0%, #122136 100%);
        border-color: #304766;
      }

      body.theme-dark .pin-hero-title,
      body.theme-dark .pin-section-title,
      body.theme-dark .pin-field label {
        color: #e8eef8;
      }

      body.theme-dark .pin-hero-subtitle,
      body.theme-dark .pin-section-subtitle {
        color: #9fb0c8;
      }

      body.theme-dark .pin-card {
        background: #1a2a43;
        border-color: #304766;
      }

      body.theme-dark .pin-status-badge.off {
        background: #21344f;
        color: #d0deef;
        border-color: #3a567c;
      }

      body.theme-dark .pin-status-badge.on {
        background: #143528;
        color: #8be0b6;
        border-color: #236447;
      }

      body.theme-dark .pin-input {
        background: #0f1a2d;
        border-color: #334a6c;
        color: #e8eef8;
      }

      body.theme-dark .pin-eye-btn {
        color: #c6d4ea;
      }

      body.theme-dark .pin-eye-btn.active {
        color: #60a5fa;
      }

      body.theme-dark .pin-danger-btn {
        background: #3b1b28;
        border-color: #7e2b45;
        color: #ffd2de;
      }

      body.theme-dark .pin-danger-btn:hover {
        background: #4a2232;
      }

      body.theme-dark .security-tab-btn {
        background: #182941;
        border-color: #345274;
        color: #dbe6f7;
      }

      body.theme-dark .security-tab-btn.active {
        background: #223a5e;
        border-color: #4a6ea4;
        color: #a9c9ff;
      }

      body.theme-dark .security-block {
        background: #152238;
        border-color: #2a3d59;
      }

      body.theme-dark .pin-gate-card {
        background: #121f34;
        border-color: #2c4264;
        box-shadow: 0 14px 32px rgba(0, 0, 0, 0.4);
      }

      body.theme-dark .pin-gate-title {
        color: #e8eef8;
      }

      body.theme-dark .pin-gate-subtitle {
        color: #9fb0c8;
      }

      body.theme-dark .pin-gate-dot {
        border-color: #3c557a;
        background: #15243b;
      }

      body.theme-dark .pin-gate-dot.filled {
        border-color: #60a5fa;
        background: #1e3a5f;
      }

      body.theme-dark .pin-gate-dot.filled.success {
        border-color: #22c55e;
        background: #123524;
      }

      body.theme-dark .pin-gate-dot.filled.error {
        border-color: #ef4444;
        background: #3f1b1b;
      }

      body.theme-dark .pin-gate-key {
        background: #182941;
        border-color: #32507a;
        color: #e8eef8;
      }

      body.theme-dark .pin-gate-key img {
        filter: brightness(0) invert(1);
      }

      body.theme-dark .pin-gate-shield img {
        filter: brightness(0) saturate(100%) invert(76%) sepia(61%) saturate(468%) hue-rotate(180deg) brightness(95%) contrast(101%);
      }

      body.theme-dark .pin-gate-foot {
        border-top-color: #2b4263;
      }

      body.theme-dark .pin-gate-recovery-link {
        color: #93c5fd;
      }

      body.theme-dark .pin-gate-recovery-link img {
        filter: brightness(0) saturate(100%) invert(82%) sepia(13%) saturate(1223%) hue-rotate(184deg) brightness(100%) contrast(97%);
      }

      body.theme-dark #employeePanel {
        border-color: #2f4568;
        background: #18263d;
      }

      body.theme-dark .employee-form-group {
        border-color: #2f4568;
        background: #1b2b45;
      }

      body.theme-dark .employee-form-group-title,
      body.theme-dark .employee-form-label,
      body.theme-dark #employeePanel .panel-title {
        color: #e8eef8;
      }

      body.theme-dark .employee-form-hint {
        color: #9fb0c9;
      }

      body.theme-dark #employeePanel input[type="text"],

  <body>
    <div class="wrap">
      <div class="card">
        <h1 id="appTitle" class="app-title">PVZ Service</h1>
        <div id="screen" class="mt12"></div>

    <nav id="bottomNav" class="bottom-nav"></nav>

    <script>
      const tg = window.Telegram?.WebApp;
      const APP_VERSION = "v2.8";
      if (tg) {
        tg.ready();
        tg.expand();
        tg.disableVerticalSwipes?.();
      }

      const dayNames = [
        "Воскресенье",

        "Вторник",
        "Среда",
        "Четверг",
        "Пятница",
        "Суббота"

      const positions = {

        senior_manager: "Старший менеджер",
        manager: "Менеджер",
        intern: "Стажер"
      };

      const reliabilities = {
        reliable: "Надежный",
        checking: "Проверяется",
        borderline: "На грани увольнения"
      };
      const userRoles = {
        SUPERADMIN: "Гл. Админ",
        ADMIN: "Админ",
        PARTICIPANT: "Участник"
      };
      const monthNamesRu = [
        "Январь",
        "Февраль",
        "Март",
        "Апрель",
        "Май",
        "Июнь",
        "Июль",
        "Август",
        "Сентябрь",
        "Октябрь",
        "Ноябрь",
        "Декабрь"
      ];
      const deductionRules = [
        { code: "mess", title: "Беспорядок", fixed: -300, hint: "-300 рублей" },
        { code: "acceptance", title: "Приёмка", variable: true, hint: "Введите сумму удержания" },
        { code: "returns", title: "Возвраты", variable: true, hint: "Введите сумму удержания" },
        { code: "defect", title: "Брак", variable: true, hint: "Введите сумму удержания" },
        { code: "swap", title: "Подмена", variable: true, hint: "Введите сумму удержания" }
      ];
      const bonusRules = [
        { code: "urgent", title: "Экстренная замена", variable: true, hint: "Введите сумму доплаты" },
        { code: "inventory", title: "Инвентаризация", variable: true, hint: "Введите сумму доплаты" },
        { code: "general_cleaning", title: "Генеральная уборка", variable: true, hint: "Введите сумму доплаты" },
        { code: "basic_cleaning", title: "Базовая уборка после другого сотрудника", fixed: 300, hint: "+300 рублей" }
      ];

      const state = {
        telegramUser: null,
        user: null,
        telegramId: null,
        sessionId: "",
        locations: [],
        employees: [],
        currentEmployee: null,
        selectedLocation: null,
        selectedMonth: "",
        avatarNonce: String(Date.now()),
        scheduleViewMode: null,
        activeTab: "home",
        theme: "light",
        security: {
          pinState: null
        }
      };

      const screen = document.getElementById("screen");
      const appTitle = document.getElementById("appTitle");
      const bottomNav = document.getElementById("bottomNav");
      const THEME_STORAGE_KEY = "pvz_theme";
      const SESSION_STORAGE_KEY = "pvz_session_id";

      function syncModalScrollLock() {
        const hasOpenModal = !!document.querySelector(".modal:not(.hidden)");
        document.body.classList.toggle("modal-open", hasOpenModal);
      }

      const modalLockObserver = new MutationObserver(() => {
        syncModalScrollLock();
      });
      modalLockObserver.observe(document.body, {
        subtree: true,
        childList: true,
        attributes: true,
        attributeFilter: ["class"]
      });
      syncModalScrollLock();

      function applyTheme() {
        const isDark = state.theme === "dark";
        document.body.classList.toggle("theme-dark", isDark);
      }

      function setTheme(nextTheme, { persist = true } = {}) {
        state.theme = nextTheme === "dark" ? "dark" : "light";
        applyTheme();
        if (persist) {
          try {
            localStorage.setItem(THEME_STORAGE_KEY, state.theme);
          } catch {}
        }
      }

      function toggleTheme() {
        setTheme(state.theme === "dark" ? "light" : "dark");
      }

      function setAppTitle(value) {
        if (!value) {
          appTitle.textContent = "";
          appTitle.classList.add("hidden");
          return;
        }
        appTitle.textContent = value;
        appTitle.classList.remove("hidden");
      }

      function showSavedFeedback(el, text = "Сохранено") {
        if (!el) return;
        el.textContent = text;
        el.classList.add("visible");
        if (el._saveFeedbackTimer) {
          window.clearTimeout(el._saveFeedbackTimer);
        }
        el._saveFeedbackTimer = window.setTimeout(() => {
          el.classList.remove("visible");
          el.textContent = "";
        }, 1600);
      }

      function showAccessDenied() {
        const message = "Недостаточно прав для раздела Сотрудники";
        if (typeof tg?.showAlert === "function") {
          tg.showAlert(message);
          return;
        }
        window.alert(message);
      }

      function confirmAction(message) {
        if (typeof tg?.showConfirm === "function") {
          return new Promise((resolve) => {
            tg.showConfirm(message, (ok) => resolve(!!ok));
          });
        }
        return Promise.resolve(window.confirm(message));
      }

      function renderBottomNav(active = state.activeTab) {
        state.activeTab = active;
        const employeesLocked = !canManageEmployees();
        bottomNav.innerHTML = `
          <button class="bottom-nav-btn ${active === "home" ? "active" : ""}" data-tab="home">
            <img class="bottom-nav-icon" src="/icons/nav-home.png" alt="Главная" />
            <span class="bottom-nav-label">Главная</span>
          </button>
          <button class="bottom-nav-btn ${active === "schedule" ? "active" : ""}" data-tab="schedule">
            <img class="bottom-nav-icon" src="/icons/nav-schedule.png" alt="График" />
            <span class="bottom-nav-label">График</span>
          </button>
          <button class="bottom-nav-btn ${active === "employees" ? "active" : ""} ${employeesLocked ? "disabled" : ""}" data-tab="employees" ${employeesLocked ? "aria-disabled='true'" : ""}>
            <img class="bottom-nav-icon employees" src="/icons/nav-employees.png" alt="Сотрудники" />
            <span class="bottom-nav-label">Сотрудники</span>
          </button>
          <button class="bottom-nav-btn ${active === "profile" ? "active" : ""}" data-tab="profile">
            <img class="bottom-nav-icon" src="/icons/nav-profile.png" alt="Профиль" />
            <span class="bottom-nav-label">Профиль</span>
          </button>
        `;
        for (const btn of bottomNav.querySelectorAll("[data-tab]")) {
          btn.addEventListener("click", () => {
            const tab = btn.dataset.tab;
            if (tab === "home") {
              renderMain();
              return;
            }
            if (tab === "schedule") {
              renderLocations();
              return;
            }
            if (tab === "employees") {
              if (!canManageEmployees()) {
                showAccessDenied();
                return;
              }
              renderEmployeesBase();
              return;
            }
            if (tab === "profile") {
              renderProfile();
            }
          });
        }
      }

      function canManageEmployees() {
        return state.user?.role === "ADMIN" || state.user?.role === "SUPERADMIN";
      }

      function canEditSchedule() {
        return state.user?.role === "ADMIN" || state.user?.role === "SUPERADMIN";
      }

      function isPhoneClient() {
        const platform = String(tg?.platform || "").toLowerCase();
        if (platform === "ios" || platform === "android") return true;
        return window.matchMedia("(max-width: 860px)").matches;
      }

      async function ensureDesktopFullscreenForSchedule() {
        if (isPhoneClient()) return;
        try {
          if (typeof tg?.requestFullscreen === "function") {
            tg.requestFullscreen();
            return;
          }
        } catch {}

        try {
          if (!document.fullscreenElement && document.documentElement.requestFullscreen) {
            await document.documentElement.requestFullscreen();
          }
        } catch {}
      }

      function canEditEmployeeFromList(employee) {
        if (!state.user) return false;
        if (state.user.role === "SUPERADMIN") return true;
        if (state.user.role === "ADMIN") {
          const normalize = (value) =>
            String(value || "")
              .replace(/\u00a0/g, " ")
              .replace(/\s+/g, " ")
              .trim()
              .toLowerCase();
          const isSelf =
            String(employee?.telegramId || "").trim() !== "" &&
            String(employee?.telegramId || "").trim() === String(state.user.telegramId || "").trim();
          const isSelfByName = normalize(employee?.fullName) && normalize(employee?.fullName) === normalize(state.user?.fullName);
          if (isSelf || isSelfByName) return true;
          return (employee?.accessRole || "PARTICIPANT") === "PARTICIPANT";
        }
        return false;
      }

      function getCurrentEmployeeFromState() {
        if (state.currentEmployee) return state.currentEmployee;
        const ownTelegramId = String(state.user?.telegramId || "").trim();
        if (!ownTelegramId) return null;
        const fromList = (state.employees || []).find(
          (emp) => String(emp?.telegramId || "").trim() === ownTelegramId
        );
        return fromList || null;
      }

      function buildEmployeeAliases(employee) {
        const normalize = (value) =>
          String(value || "")
            .trim()
            .replace(/\s+/g, " ")
            .toLowerCase();
        const aliases = new Set();
        const fullName = normalize(employee?.fullName);
        const firstName = normalize(employee?.firstName);
        const lastName = normalize(employee?.lastName);
        const firstLast = normalize([firstName, lastName].filter(Boolean).join(" "));
        const lastFirst = normalize([lastName, firstName].filter(Boolean).join(" "));
        if (fullName) aliases.add(fullName);
        if (firstLast) aliases.add(firstLast);
        if (lastFirst) aliases.add(lastFirst);
        return aliases;
      }

      function employeeAssignedToShift(aliases, shiftRow) {
        const normalize = (value) =>
          String(value || "")
            .trim()
            .replace(/\s+/g, " ")
            .toLowerCase();
        const e1 = normalize(shiftRow?.executor1);
        const e2 = normalize(shiftRow?.executor2);
        return (e1 && aliases.has(e1)) || (e2 && aliases.has(e2));
      }

      function withAvatarCacheBust(url, nonce = state.avatarNonce) {
        const raw = String(url || "").trim();
        if (!raw) return "";
        const sep = raw.includes("?") ? "&" : "?";
        return `${raw}${sep}v=${encodeURIComponent(nonce)}`;
      }

      function monthNow() {
        const now = new Date();
        return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;
      }

      function getTelegramUser() {
        const user = tg?.initDataUnsafe?.user;
        if (!user?.id) return null;
        const fullName = [user.first_name, user.last_name].filter(Boolean).join(" ").trim();
        return {
          telegramId: String(user.id),
          fullName: fullName || user.username || "Unknown User",
          username: user.username ? `@${user.username}` : "",
          photoUrl: user.photo_url || ""
        };
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function formatDateTime(value) {
        const raw = String(value || "").trim();
        if (!raw) return "—";
        const dt = new Date(raw);
        if (!Number.isFinite(dt.getTime())) return raw;
        return dt.toLocaleString("ru-RU", {
          day: "2-digit",
          month: "2-digit",
          year: "numeric",
          hour: "2-digit",
          minute: "2-digit"
        });
      }

      function formatSessionDateTime(value) {
        const raw = String(value || "").trim();
        if (!raw) return "—";
        const dt = new Date(raw);
        if (!Number.isFinite(dt.getTime())) return raw;
        const startOfDay = (date) => new Date(date.getFullYear(), date.getMonth(), date.getDate()).getTime();
        const today = startOfDay(new Date());
        const target = startOfDay(dt);
        const dayDiff = Math.round((today - target) / 86400000);
        const time = dt.toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit" });
        if (dayDiff === 0) return `Сегодня, ${time}`;
        if (dayDiff === 1) return `Вчера, ${time}`;
        return dt.toLocaleString("ru-RU", {
          day: "2-digit",
          month: "2-digit",
          year: "numeric",
          hour: "2-digit",
          minute: "2-digit"
        });
      }

      function getSessionDeviceType(item) {
        const value = `${item?.platform || ""} ${item?.deviceName || ""} ${item?.userAgent || ""}`.toLowerCase();
        return /android|iphone|ipad|ios|mobile/.test(value) ? "mobile" : "desktop";
      }

      function renderLocationLabelHtml(value) {
        const raw = String(value || "");
        if (!raw.trim()) return "";
        return raw
          .split(",")
          .map((chunk) => {
            const part = chunk.trim();
            if (!part) return "";
            const lower = part.toLowerCase();
            if (lower.startsWith("ozon")) {
              const match = part.match(/^(ozon)\s+(.*)$/i);
              if (!match) return `<span class="brand-ozon">ozon</span>`;
              return `<span class="brand-ozon">${escapeHtml(match[1])}</span> ${escapeHtml(match[2])}`;
            }
            if (lower.startsWith("wb")) {
              const match = part.match(/^(wb)\s+(.*)$/i);
              if (!match) return `<span class="brand-wb">wb</span>`;
              return `<span class="brand-wb">${escapeHtml(match[1])}</span> ${escapeHtml(match[2])}`;
            }
            return escapeHtml(part);
          })
          .filter(Boolean)
          .join(", ");
      }

      async function api(path, options = {}) {
        const headers = {
          "Content-Type": "application/json",
          ...(options.headers || {})
        };
        if (state.telegramId) headers["x-telegram-id"] = state.telegramId;
        if (state.sessionId) headers["x-session-id"] = state.sessionId;

        const response = await fetch(path, { ...options, headers });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          if (response.status === 423 && data?.pinRequired) {
            throw new Error("Требуется PIN-код");
          }
          throw new Error(data?.message || data?.error || "Ошибка API");
        }
        return data;
      }

      async function loadEmployees() {
        const data = await api("/api/employees");
        state.employees = data.employees || [];
      }

      async function loadEmployeesSafe() {
        try {
          await loadEmployees();
        } catch (error) {
          const message = String(error?.message || "");
          if (
            message.includes("Недостаточно прав") ||
            message.includes("Insufficient permissions") ||
            message.includes("Forbidden")
          ) {
            state.employees = [];
            return;
          }
          throw error;
        }
      }

      async function bootstrapAfterAuth() {
        const locationsData = await api("/api/schedule/locations");
        state.locations = locationsData.locations || [];
        await loadEmployeesSafe();
        renderMain();
      }

      function renderPinGate(pinState = null) {
        setAppTitle("");
        const pinLength = Math.max(4, Math.min(8, Number(pinState?.pinLength || 4)));
        const lockText = pinState?.lockedUntil
          ? `Вход заблокирован до ${formatDateTime(pinState.lockedUntil)}`
          : "";
        let pinValue = "";
        let verifying = false;
        let dotsState = "idle";
        screen.innerHTML = `
          <div class="pin-gate-overlay">
            <div class="pin-gate-card">
              <div class="pin-gate-head">
                <div style="width:24px;height:24px;"></div>
                <button id="pinGateCloseBtn" class="open-arrow-btn" type="button" aria-label="Закрыть">
                  <img src="/icons/back-arrow.png" alt="Закрыть" />
                </button>
              </div>
              <div class="pin-gate-shield">
                <img src="/icons/pin-protection.png" alt="Защита" />
              </div>
              <h3 class="pin-gate-title">Введите PIN-код</h3>
              <div class="pin-gate-subtitle">Для доступа к приложению введите ваш PIN-код</div>
              ${lockText ? `<p class="status error mt8" style="text-align:center;">${escapeHtml(lockText)}</p>` : ""}
              <div id="pinGateDots" class="pin-gate-dots"></div>
              <div class="pin-gate-keypad">
                <button class="pin-gate-key" data-pin-key="1" type="button">1</button>
                <button class="pin-gate-key" data-pin-key="2" type="button">2</button>
                <button class="pin-gate-key" data-pin-key="3" type="button">3</button>
                <button class="pin-gate-key" data-pin-key="4" type="button">4</button>
                <button class="pin-gate-key" data-pin-key="5" type="button">5</button>
                <button class="pin-gate-key" data-pin-key="6" type="button">6</button>
                <button class="pin-gate-key" data-pin-key="7" type="button">7</button>
                <button class="pin-gate-key" data-pin-key="8" type="button">8</button>
                <button class="pin-gate-key" data-pin-key="9" type="button">9</button>
                <div class="pin-gate-spacer" aria-hidden="true"></div>
                <button class="pin-gate-key" data-pin-key="0" type="button">0</button>
                <button class="pin-gate-key" id="pinGateBackspaceBtn" type="button" aria-label="Удалить символ">
                  <img src="/icons/pin-delete.png" alt="Удалить" />
                </button>
              </div>
              <p id="pinGateStatus" class="status mt12" style="text-align:center;"></p>
              <div class="pin-gate-foot">
                <button id="pinRecoveryRequestBtn" class="pin-gate-recovery-link" type="button">
                  <img src="/icons/pin-help.png" alt="Помощь" />
                  <span>Забыли PIN-код?</span>
                </button>
              </div>
            </div>
          </div>
        `;
        const dots = document.getElementById("pinGateDots");
        const status = document.getElementById("pinGateStatus");

        const setKeypadDisabled = (disabled) => {
          for (const btn of screen.querySelectorAll(".pin-gate-key")) {
            btn.disabled = disabled;
          }
          const recoveryBtn = document.getElementById("pinRecoveryRequestBtn");
          if (recoveryBtn) recoveryBtn.disabled = disabled;
        };

        const renderDots = () => {
          if (!dots) return;
          dots.innerHTML = Array.from({ length: pinLength })
            .map((_, index) => {
              const classes = ["pin-gate-dot"];
              if (index < pinValue.length) {
                classes.push("filled");
                if (dotsState === "success") classes.push("success");
                if (dotsState === "error") classes.push("error");
              }
              return `<span class="${classes.join(" ")}"></span>`;
            })
            .join("");
        };

        const verify = async () => {
          if (verifying) return;
          if (pinValue.length !== pinLength) {
            status.className = "status error";
            status.textContent = `Введите ${pinLength} цифры PIN`;
            return;
          }
          verifying = true;
          setKeypadDisabled(true);
          try {
            const data = await api("/api/security/pin/verify", {
              method: "POST",
              body: JSON.stringify({ pin: pinValue })
            });
            state.security.pinState = data?.pinState || null;
            dotsState = "success";
            renderDots();
            await new Promise((resolve) => setTimeout(resolve, 240));
            await bootstrapAfterAuth();
            return;
          } catch (error) {
            dotsState = "error";
            renderDots();
            status.className = "status error";
            status.textContent = String(error?.message || "Неверный PIN");
            await new Promise((resolve) => setTimeout(resolve, 360));
            pinValue = "";
            dotsState = "idle";
            renderDots();
            try {
              const stateData = await api("/api/security/state");
              state.security.pinState = stateData?.pinState || null;
            } catch {}
          } finally {
            verifying = false;
            setKeypadDisabled(false);
          }
        };

        for (const btn of screen.querySelectorAll("[data-pin-key]")) {
          btn.addEventListener("click", () => {
            if (verifying) return;
            const digit = btn.getAttribute("data-pin-key");
            if (!/^\d$/.test(String(digit || ""))) return;
            if (pinValue.length >= pinLength) return;
            dotsState = "idle";
            pinValue += digit;
            renderDots();
            status.className = "status";
            status.textContent = "";
            if (pinValue.length === pinLength) {
              verify();
            }
          });
        }
        document.getElementById("pinGateBackspaceBtn")?.addEventListener("click", () => {
          if (verifying) return;
          dotsState = "idle";
          pinValue = pinValue.slice(0, -1);
          renderDots();
        });
        document.getElementById("pinRecoveryRequestBtn")?.addEventListener("click", async () => {
          try {
            const data = await api("/api/security/pin/recovery/request", { method: "POST" });
            status.className = "status ok";
            status.textContent = String(data?.message || "Запрос отправлен администратору. Новый PIN сформирован.");
          } catch (error) {
            status.className = "status error";
            status.textContent = String(error?.message || "Ошибка");
          }
        });
        document.getElementById("pinGateCloseBtn")?.addEventListener("click", () => {
          tg?.close?.();
        });
        renderDots();
      }

          applyTheme();

            screen.innerHTML = `<p class="status error">Открой Mini App из Telegram.</p>`;
            return;
          }

          state.telegramUser = tgUser;
          state.telegramId = tgUser.telegramId;

          try {

            if (savedSessionId) {
              state.sessionId = savedSessionId;
              const sessionData = await api("/api/auth/session");
              state.user = sessionData?.user || null;
              state.security.pinState = sessionData?.security?.pinState || null;
              if (state.user) {

                  renderPinGate(sessionData?.security?.pinState || null);
                  return;

                return;
              }
            }
          } catch {
            state.sessionId = "";
            try {
              localStorage.removeItem(SESSION_STORAGE_KEY);
            } catch {}
          }

          const login = await api("/api/auth/login", {
            method: "POST",
            body: JSON.stringify({
              telegramId: tgUser.telegramId,
              fullName: tgUser.fullName,
              username: tgUser.username || "",
              photoUrl: tgUser.photoUrl || "",
              deviceName: tg?.platform || navigator.platform || "device",

            })
          });

          state.user = login.user;

          state.sessionId = String(login?.session?.id || "");
          try {
            localStorage.setItem(SESSION_STORAGE_KEY, state.sessionId);
          } catch {}
          state.selectedMonth = monthNow();
          state.avatarNonce = String(Date.now());
          state.security.pinState = login?.security?.pinState || null;

          if (login?.security?.pinRequired) {
            renderPinGate(login?.security?.pinState || null);
            return;
          }

          await bootstrapAfterAuth();
        } catch (error) {
          screen.innerHTML = `<p class="status error">Ошибка: ${escapeHtml(error.message)}</p>`;
        }

      async function renderMain() {
        setAppTitle("PVZ Service");
        const photo = withAvatarCacheBust(state.telegramUser?.photoUrl || "");

          .split(" ")
          .filter(Boolean)
          .slice(0, 2)
          .map((w) => w[0]?.toUpperCase() || "")
          .join("");
        const todayIso = new Date(Date.now() - new Date().getTimezoneOffset() * 60 * 1000)
          .toISOString()
          .slice(0, 10);
        let shiftText = "Выходной";
        let overviewShift = "—";
        let overviewStatus = "Выходной";
        let todayCardTitle = "Сегодня выходной";
        let upcomingLines = ["Нет запланированных смен"];
        let todayTeamTitle = "";
        let todayTeamSub = "Пока вы не назначены на смену";
        let emptyShiftLines = ["Свободных смен на ближайшие 3 дня нет"];
        let positionLabel = positions[getCurrentEmployeeFromState()?.position] || "Сотрудник";
        let shiftDotClass = "off";
        const formatCountdown = (shiftDate, shiftStart) => {
          const dateValue = String(shiftDate || "").trim();
          const timeValue = String(shiftStart || "14:00").slice(0, 5);
          if (!/^\d{4}-\d{2}-\d{2}$/.test(dateValue) || !/^\d{2}:\d{2}$/.test(timeValue)) {
            return "";
          }
          const target = new Date(`${dateValue}T${timeValue}:00`);
          const diff = target.getTime() - Date.now();
          if (!Number.isFinite(diff) || diff <= 0) return "";
          const totalHours = Math.floor(diff / (1000 * 60 * 60));
          const days = Math.floor(totalHours / 24);
          const hours = totalHours % 24;
          return `${days} д ${hours} ч`;
        };
        const formatUpcomingDate = (isoDate) => {
          const value = String(isoDate || "").trim();
          if (!/^\d{4}-\d{2}-\d{2}$/.test(value)) return "";
          if (value === todayIso) return "Сегодня";
          const tomorrow = new Date(`${todayIso}T00:00:00`);
          tomorrow.setDate(tomorrow.getDate() + 1);
          const tomorrowIso = tomorrow.toISOString().slice(0, 10);
          if (value === tomorrowIso) {
            const [, month, day] = value.match(/^(\d{4})-(\d{2})-(\d{2})$/) || [];
            return `Завтра (${day}.${month})`;
          }
          const dateObj = new Date(`${value}T00:00:00`);
          return dateObj.toLocaleDateString("ru-RU", { day: "numeric", month: "long" });
        };
        const addDaysIso = (isoDate, days) => {
          const match = String(isoDate || "").match(/^(\d{4})-(\d{2})-(\d{2})$/);
          if (!match) return isoDate;
          const year = Number(match[1]);
          const month = Number(match[2]);
          const day = Number(match[3]);
          const utc = new Date(Date.UTC(year, month - 1, day + Number(days || 0)));
          const y = String(utc.getUTCFullYear());
          const m = String(utc.getUTCMonth() + 1).padStart(2, "0");
          const d = String(utc.getUTCDate()).padStart(2, "0");
          return `${y}-${m}-${d}`;
        };
        try {
          const [todayData, upcomingData] = await Promise.all([
            api(`/api/schedule/me/today?date=${todayIso}`),
            api(`/api/schedule/me/upcoming?fromDate=${todayIso}&limit=4`)
          ]);
          if (todayData?.employee) {
            state.currentEmployee = todayData.employee;
            positionLabel = positions[todayData.employee?.position] || positionLabel;
          }
          const assignments = Array.isArray(todayData.assignments) ? todayData.assignments : [];
          if (assignments.length === 1) {
            const one = assignments[0];
            const time = `${one.workStart || "14:00"} - ${one.workEnd || "22:00"}`;
            shiftText = "Работаю";
            shiftDotClass = "on";
            overviewShift = time;
            overviewStatus = "Рабочий день";
            todayCardTitle = "Сегодня рабочий день";
            const coworker = String(one.coworkerName || "").trim();
            if (coworker) {
              todayTeamTitle = `Сегодня ваша смена с ${coworker}`;
              todayTeamSub = one.locationTitle || "Ваша смена";
            } else {
              todayTeamTitle = "Сегодня вы одни на смене";
              todayTeamSub = one.locationTitle || "Ваша смена";
            }
          } else if (assignments.length > 1) {
            const first = assignments[0];
            const firstTime = `${first.workStart || "14:00"} - ${first.workEnd || "22:00"}`;
            shiftText = "Работаю";
            shiftDotClass = "on";
            overviewShift = `${assignments.length} смены`;
            overviewStatus = firstTime;
            todayCardTitle = "Сегодня рабочий день";
            const coworker = String(first.coworkerName || "").trim();
            if (coworker) {
              todayTeamTitle = `Сегодня ваша смена с ${coworker}`;
              todayTeamSub = `И еще ${assignments.length - 1} смен(ы)`;
            } else {
              todayTeamTitle = "Сегодня вы одни на смене";
              todayTeamSub = `И еще ${assignments.length - 1} смен(ы)`;
            }
          }
          const upcomingShifts = Array.isArray(upcomingData.shifts) ? upcomingData.shifts : [];
          if (!assignments.length && upcomingShifts.length) {
            const nearestShift = upcomingShifts
              .slice()
              .sort((a, b) => {
                const aMs = new Date(`${String(a?.date || "")}T${String(a?.workStart || "14:00").slice(0, 5)}:00`).getTime();
                const bMs = new Date(`${String(b?.date || "")}T${String(b?.workStart || "14:00").slice(0, 5)}:00`).getTime();
                return aMs - bMs;
              })[0];
            const countdown = formatCountdown(nearestShift?.date, nearestShift?.workStart);
            if (countdown) {
              todayCardTitle = "До смены";
              overviewShift = countdown;
            }
            const nearestDateLabel = formatUpcomingDate(nearestShift?.date);
            const nearestLocation = String(nearestShift?.locationTitle || "").trim();
            const nearestCoworker = String(nearestShift?.coworkerName || "").trim();
            if (nearestCoworker) {
              todayTeamSub = `У вас будет смена с ${nearestCoworker}`;
            } else if (nearestDateLabel && nearestLocation) {
              todayTeamSub = "Вы будете одни на смене";
            }
          }
          const labels = upcomingShifts
            .map((item) => {
              const dateLabel = formatUpcomingDate(item?.date);
              const locationTitle = String(item?.locationTitle || "").trim();
              if (!dateLabel || !locationTitle) return "";
              return `${dateLabel} — ${locationTitle}`;
            })
            .filter(Boolean);
          if (labels.length) {
            upcomingLines = labels;
          }

          const nextDates = [todayIso, addDaysIso(todayIso, 1), addDaysIso(todayIso, 2)];
          const monthsToLoad = [...new Set(nextDates.map((date) => String(date).slice(0, 7)))];
          const scheduleResponses = await Promise.all(
            (state.locations || []).flatMap((loc) =>
              monthsToLoad.map((month) =>
                api(`/api/schedule/${loc.code}?month=${month}`)
                  .then((data) => ({
                    locationCode: loc.code,
                    month,
                    shifts: Array.isArray(data?.shifts) ? data.shifts : []
                  }))
                  .catch(() => ({
                    locationCode: loc.code,
                    month,
                    shifts: []
                  }))
              )
            )
          );
          const scheduleMap = new Map(
            scheduleResponses.map((item) => [`${item.locationCode}:${item.month}`, item.shifts])
          );
          const emptyRowsByDate = new Map();
          const seenEmptyRows = new Set();
          for (const date of nextDates) {
            const monthKey = String(date).slice(0, 7);
            for (const loc of state.locations || []) {
              const shifts = scheduleMap.get(`${loc.code}:${monthKey}`) || [];
              const row = shifts.find((item) => String(item?.date) === date);
              const e1 = String(row?.executor1 || "").trim();
              const e2 = String(row?.executor2 || "").trim();
              if (!e1 && !e2) {
                const dateLabel = formatUpcomingDate(date);
                const key = `${dateLabel}::${loc.title}`;
                if (!seenEmptyRows.has(key)) {
                  seenEmptyRows.add(key);
                  const current = emptyRowsByDate.get(dateLabel) || [];
                  current.push(loc.title);
                  emptyRowsByDate.set(dateLabel, current);
                }
              }
            }
          }
          const groupedRows = [...emptyRowsByDate.entries()].map(
            ([dateLabel, locations]) => `${dateLabel} — ${locations.join(", ")}`
          );
          if (groupedRows.length) {
            emptyShiftLines = groupedRows;
          }
        } catch {
          // fallback значения уже заданы
        }
        const emptyShiftLinesHtml = emptyShiftLines
          .map((line) => {
            const parts = String(line || "").split(" — ");
            const dateLabel = parts[0] || "";
            const addrLabel = parts.slice(1).join(" — ");
            return `
              <div class="home-list-item">
                <div class="home-list-date">${escapeHtml(dateLabel)} <span class="home-list-sep">—</span></div>
                <div class="home-list-address">${renderLocationLabelHtml(addrLabel)}</div>
              </div>
            `;
          })
          .join("");
        const upcomingLinesHtml = upcomingLines
          .map((line) => {
            const parts = String(line || "").split(" — ");
            if (parts.length < 2) {
              return `<div class="home-list-address">${renderLocationLabelHtml(line)}</div>`;
            }
            const dateLabel = parts[0] || "";
            const addrLabel = parts.slice(1).join(" — ");
            return `
              <div class="home-list-item">
                <div class="home-list-date">${escapeHtml(dateLabel)} <span class="home-list-sep">—</span></div>
                <div class="home-list-address">${renderLocationLabelHtml(addrLabel)}</div>
              </div>
            `;
          })
          .join("");
        screen.innerHTML = `
          <div class="dash-user mt12" id="openProfileFromMain">
            ${
              photo
                ? `<img class="dash-avatar" src="${escapeHtml(photo)}" alt="avatar" />`
                : `<div class="dash-avatar">${escapeHtml(initials || "?")}</div>`
            }
            <div>
              <div style="font-size:20px;"><strong>${escapeHtml((state.user.fullName || "").split(" ")[0] || state.user.fullName)}</strong></div>
              <div class="muted mt8">Должность: <strong>${escapeHtml(positionLabel)}</strong></div>
              <div class="muted mt8"><span class="dash-dot ${escapeHtml(shiftDotClass)}"></span> ${escapeHtml(shiftText)}</div>
            </div>
            <img class="dash-arrow" src="/icons/right-arrow.png" alt="Открыть" />
          </div>
          <h2 class="mt16">Обзор</h2>
          <div class="overview-grid mt12">
            <div class="overview-card blue">
              <h3>${escapeHtml(todayCardTitle)}</h3>
              <div class="big">${escapeHtml(overviewShift)}</div>
              ${todayTeamTitle ? `<div class="home-main-note">${escapeHtml(todayTeamTitle)}</div>` : ""}
              <div class="home-sub-note">${escapeHtml(todayTeamSub)}</div>
            </div>
            <div class="overview-card green">
              <h3>Ваши ближайшие смены</h3>
              <div class="home-list">${upcomingLinesHtml}</div>
            </div>
          </div>
          <div class="warn-banner mt12">
            <div><strong>Свободные смены</strong></div>
            <div class="home-list">${emptyShiftLinesHtml}</div>
          </div>
        `;
        renderBottomNav("home");
        document.getElementById("openProfileFromMain")?.addEventListener("click", () => {
          renderProfile();
        });
      }
