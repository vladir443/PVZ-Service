<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PVZ Service</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      :root {
        --bg: #eef2f7;
        --card: #ffffff;
        --line: #d5dce7;
        --text: #1f2937;
        --muted: #6b7280;
        --primary: #0f766e;
        --primary-dark: #0b5a54;
        --danger: #b42318;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        color: var(--text);
        background: linear-gradient(180deg, #f5f7fb 0%, #eef2f7 100%);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        overscroll-behavior-y: none;
      }

      .wrap {
        max-width: none;
        margin: 0 auto;
        padding: 8px;
        min-height: 100dvh;
      }

      .card {
        background: var(--card);
        border-radius: 14px;
        padding: 14px;
        box-shadow: 0 10px 26px rgba(15, 23, 42, 0.1);
        min-height: calc(100dvh - 16px);
      }

      h1 { margin: 0; font-size: 24px; }
      h2 { margin: 0; font-size: 20px; }

      .mt8 { margin-top: 8px; }
      .mt12 { margin-top: 12px; }
      .mt16 { margin-top: 16px; }

      .muted { color: var(--muted); }

      .row {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }

      .button {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 15px;
        cursor: pointer;
        color: #fff;
        background: var(--primary);
      }

      .button:hover { background: var(--primary-dark); }
      .button.secondary { background: #334155; }
      .button.danger { background: var(--danger); }

      .menu-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 8px;
      }

      .location-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 8px;
      }

      .location-btn {
        text-align: left;
        min-height: 62px;
      }

      .profile-box {
        display: flex;
        gap: 12px;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px;
        background: #f9fbff;
      }

      .avatar {
        width: 58px;
        height: 58px;
        border-radius: 50%;
        object-fit: cover;
        border: 1px solid #b7c3d4;
        flex: 0 0 auto;
      }

      .avatar.placeholder {
        display: grid;
        place-items: center;
        font-weight: 700;
        background: #dce7f5;
      }

      input[type="text"],
      input[type="number"],
      input[type="month"],
      input[type="tel"],
      select {
        width: 100%;
        border: 1px solid #c5ced8;
        border-radius: 8px;
        padding: 7px 8px;
        font-size: 14px;
      }

      .table-wrap {
        width: 100%;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 10px;
      }

      table {
        width: 100%;
        min-width: 940px;
        border-collapse: collapse;
        background: #fff;
      }

      th, td {
        border: 1px solid var(--line);
        padding: 7px;
        vertical-align: middle;
      }

      th {
        background: #f7f9fc;
        white-space: nowrap;
      }

      td.day { font-weight: 600; }

      .status {
        font-size: 14px;
        min-height: 18px;
      }

      .status.ok { color: #1d9f60; }
      .status.error { color: var(--danger); }

      .employees-list {
        display: grid;
        gap: 8px;
      }

      .employee-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 9px 10px;
        background: #fafcff;
      }

      .employee-meta {
        font-size: 13px;
        color: var(--muted);
      }

      .badge {
        display: inline-block;
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 12px;
        font-weight: 600;
        margin-left: 6px;
      }

      .badge.reliable { background: #dff7e8; color: #157a3f; }
      .badge.checking { background: #fff4cc; color: #7a5600; }
      .badge.borderline { background: #ffe0e0; color: #9b1c1c; }

      .employees-form {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 8px;
      }

      .modal {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.45);
        display: grid;
        place-items: center;
        padding: 12px;
        z-index: 50;
      }

      .modal.hidden {
        display: none;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px;
        background: #f8fbff;
        width: min(760px, 100%);
        max-height: calc(100dvh - 32px);
        overflow: auto;
      }

      .panel.hidden {
        display: none;
      }

      .panel-title {
        margin: 0;
        font-size: 16px;
      }

      @media (max-width: 640px) {
        .wrap { padding: 0; }
        .card {
          padding: 10px;
          min-height: 100dvh;
          border-radius: 0;
        }
        h1 { font-size: 22px; }
        .employee-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>PVZ Service</h1>
        <div id="screen" class="mt12"></div>
      </div>
    </div>

    <script>
      const tg = window.Telegram?.WebApp;
      const APP_VERSION = "v2.8";
      if (tg) {
        tg.ready();
        tg.expand();
        tg.disableVerticalSwipes?.();
      }

      const dayNames = [
        "Воскресенье",
        "Понедельник",
        "Вторник",
        "Среда",
        "Четверг",
        "Пятница",
        "Суббота"
      ];

      const positions = {
        owner: "Владелец",
        owner_manager: "Управляющий",
        senior_manager: "Старший менеджер",
        manager: "Менеджер",
        intern: "Стажер"
      };

      const reliabilities = {
        reliable: "Надежный",
        checking: "Проверяется",
        borderline: "На грани увольнения"
      };

      const state = {
        telegramUser: null,
        user: null,
        telegramId: null,
        locations: [],
        employees: [],
        selectedLocation: null,
        selectedMonth: ""
      };

      const screen = document.getElementById("screen");

      function monthNow() {
        const now = new Date();
        return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;
      }

      function getTelegramUser() {
        const user = tg?.initDataUnsafe?.user;
        if (!user?.id) return null;
        const fullName = [user.first_name, user.last_name].filter(Boolean).join(" ").trim();
        return {
          telegramId: String(user.id),
          fullName: fullName || user.username || "Unknown User",
          username: user.username ? `@${user.username}` : "",
          photoUrl: user.photo_url || ""
        };
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      async function api(path, options = {}) {
        const headers = {
          "Content-Type": "application/json",
          ...(options.headers || {})
        };
        if (state.telegramId) headers["x-telegram-id"] = state.telegramId;

        const response = await fetch(path, { ...options, headers });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(data?.message || data?.error || "Ошибка API");
        }
        return data;
      }

      async function loadEmployees() {
        const data = await api("/api/employees");
        state.employees = data.employees || [];
      }

      async function initApp() {
        try {
          screen.innerHTML = `<p class="muted">Подключаемся...</p>`;
          const tgUser = getTelegramUser();
          if (!tgUser) {
            screen.innerHTML = `<p class="status error">Открой Mini App из Telegram.</p>`;
            return;
          }

          state.telegramUser = tgUser;
          const login = await api("/api/auth/login", {
            method: "POST",
            body: JSON.stringify({
              telegramId: tgUser.telegramId,
              fullName: tgUser.fullName,
              username: tgUser.username || ""
            })
          });

          state.user = login.user;
          state.telegramId = login.user.telegramId;
          state.selectedMonth = monthNow();

          const locationsData = await api("/api/schedule/locations");
          state.locations = locationsData.locations || [];
          await loadEmployees();

          renderMain();
        } catch (error) {
          screen.innerHTML = `<p class="status error">Ошибка: ${escapeHtml(error.message)}</p>`;
        }
      }

      function renderMain() {
        const photo = state.telegramUser?.photoUrl;
        const initials = (state.user?.fullName || "?")
          .split(" ")
          .filter(Boolean)
          .slice(0, 2)
          .map((w) => w[0]?.toUpperCase() || "")
          .join("");

        screen.innerHTML = `
          <h2>Главный экран</h2>
          <div class="muted mt8">Версия интерфейса: ${APP_VERSION}</div>
          <div class="profile-box mt12">
            ${
              photo
                ? `<img class="avatar" src="${escapeHtml(photo)}" alt="avatar" />`
                : `<div class="avatar placeholder">${escapeHtml(initials || "?")}</div>`
            }
            <div>
              <div><strong>${escapeHtml(state.user.fullName)}</strong></div>
              <div class="muted mt8">Роль: <strong>${escapeHtml(state.user.role)}</strong></div>
            </div>
          </div>
          <div class="menu-grid mt16">
            <button class="button" id="goScheduleBtn">График</button>
            <button class="button secondary" id="goEmployeesBtn">База сотрудников</button>
          </div>
        `;

        document.getElementById("goScheduleBtn").addEventListener("click", renderLocations);
        document.getElementById("goEmployeesBtn").addEventListener("click", renderEmployeesBase);
      }

      function renderLocations() {
        const locationHtml = state.locations
          .map(
            (loc) =>
              `<button class="button location-btn" data-code="${escapeHtml(loc.code)}">${escapeHtml(
                loc.title
              )}</button>`
          )
          .join("");

        screen.innerHTML = `
          <div class="row">
            <button class="button secondary" id="backMainBtn">Назад</button>
          </div>
          <h2 class="mt12">Выбор пункта</h2>
          <div class="location-grid mt12">${locationHtml}</div>
        `;

        document.getElementById("backMainBtn").addEventListener("click", renderMain);
        for (const btn of screen.querySelectorAll("[data-code]")) {
          btn.addEventListener("click", () => {
            const location = state.locations.find((x) => x.code === btn.dataset.code);
            if (location) {
              state.selectedLocation = location;
              renderSchedule();
            }
          });
        }
      }

      function reliabilityBadge(value) {
        const label = reliabilities[value] || value;
        return `<span class="badge ${escapeHtml(value)}">${escapeHtml(label)}</span>`;
      }

      function positionOptionsHtml(selected = "manager") {
        return `
          <option value="owner" ${selected === "owner" ? "selected" : ""}>Владелец</option>
          <option value="owner_manager" ${selected === "owner_manager" ? "selected" : ""}>Управляющий</option>
          <option value="senior_manager" ${selected === "senior_manager" ? "selected" : ""}>Старший менеджер</option>
          <option value="manager" ${selected === "manager" ? "selected" : ""}>Менеджер</option>
          <option value="intern" ${selected === "intern" ? "selected" : ""}>Стажер</option>
        `;
      }

      function reliabilityOptionsHtml(selected = "checking") {
        return `
          <option value="reliable" ${selected === "reliable" ? "selected" : ""}>Надежный</option>
          <option value="checking" ${selected === "checking" ? "selected" : ""}>Проверяется</option>
          <option value="borderline" ${selected === "borderline" ? "selected" : ""}>На грани увольнения</option>
        `;
      }

      function mapEmployeeApiError(error) {
        if (!error?.message) return "Не удалось сохранить сотрудника";
        if (error.message.includes("phone") || error.message.includes("телефон")) {
          return "Некорректный номер телефона. Пример: +7 999 123-45-67";
        }
        return error.message;
      }

      function normalizeTelegramContact(value) {
        const raw = value.trim();
        if (!raw) return "";
        return raw.startsWith("@") ? raw : `@${raw}`;
      }

      function onlyDigits(value) {
        return String(value || "").replace(/\D/g, "");
      }

      function applyPhoneMask(value) {
        const digits = onlyDigits(value);
        if (!digits) return "";

        const normalized = `7${digits.startsWith("7") ? digits.slice(1) : digits}`;
        const cut = normalized.slice(0, 11);
        const p1 = cut.slice(1, 4);
        const p2 = cut.slice(4, 7);
        const p3 = cut.slice(7, 9);
        const p4 = cut.slice(9, 11);

        let out = "+7";
        if (p1) out += ` ${p1}`;
        if (p2) out += ` ${p2}`;
        if (p3) out += `-${p3}`;
        if (p4) out += `-${p4}`;
        return out;
      }

      function normalizePhone(value) {
        const masked = applyPhoneMask(value);
        const digits = onlyDigits(masked);
        if (!digits) return "";
        if (digits.length !== 11 || digits[0] !== "7") return null;
        return masked;
      }

      async function renderEmployeesBase() {
        await loadEmployees();

        const employeeHtml = state.employees.length
          ? state.employees
              .map(
                (emp) => `
                  <div class="employee-row">
                    <div>
                      <div><strong>${escapeHtml(emp.fullName)}</strong>${reliabilityBadge(
                        emp.reliability
                      )}</div>
                      <div class="employee-meta mt8">
                        ${escapeHtml(positions[emp.position] || emp.position)}
                        ${emp.phone ? ` · ${escapeHtml(emp.phone)}` : ""}
                        ${emp.telegramContact ? ` · TG: ${escapeHtml(emp.telegramContact)}` : ""}
                        ${emp.vkContact ? ` · VK: ${escapeHtml(emp.vkContact)}` : ""}
                      </div>
                    </div>
                    <button class="button secondary" data-edit-id="${emp.id}">Редактировать</button>
                  </div>
                `
              )
              .join("")
          : `<div class="muted">Список пока пуст.</div>`;

        screen.innerHTML = `
          <div class="row">
            <button class="button secondary" id="backMainBtn">Назад</button>
            <button class="button" id="openAddEmployeeBtn">Добавить сотрудника</button>
          </div>
          <h2 class="mt12">База сотрудников</h2>
          <div id="employeeModal" class="modal hidden">
            <div id="employeePanel" class="panel">
              <h3 id="employeePanelTitle" class="panel-title">Добавить сотрудника</h3>
              <div class="employees-form mt12">
                <div>
                  <div class="muted">Имя (мин 3)</div>
                  <input id="firstNameInput" type="text" />
                </div>
                <div>
                  <div class="muted">Фамилия (мин 3)</div>
                  <input id="lastNameInput" type="text" />
                </div>
                <div>
                  <div class="muted">Телефон (необязательно)</div>
                  <input id="phoneInput" type="tel" placeholder="+7 922 ***‒**‒94" inputmode="numeric" />
                </div>
                <div>
                  <div class="muted">Telegram контакт</div>
                  <input id="telegramInput" type="text" placeholder="@username" />
                </div>
                <div>
                  <div class="muted">VK контакт</div>
                  <input id="vkInput" type="text" placeholder="https://vk.com/username" />
                </div>
                <div>
                  <div class="muted">Должность</div>
                  <select id="positionInput">${positionOptionsHtml("manager")}</select>
                </div>
                <div>
                  <div class="muted">Надежность</div>
                  <select id="reliabilityInput">${reliabilityOptionsHtml("checking")}</select>
                </div>
              </div>
              <div class="row mt12">
                <button class="button" id="saveEmployeeBtn">Сохранить</button>
                <button class="button danger" id="deleteEmployeeBtn">Удалить сотрудника</button>
                <button class="button secondary" id="closeEmployeePanelBtn">Отмена</button>
              </div>
            </div>
          </div>
          <p id="employeeStatus" class="status mt8"></p>
          <div class="employees-list mt12">${employeeHtml}</div>
        `;

        document.getElementById("backMainBtn").addEventListener("click", renderMain);
        const status = document.getElementById("employeeStatus");
        const modal = document.getElementById("employeeModal");
        const panel = document.getElementById("employeePanel");
        const panelTitle = document.getElementById("employeePanelTitle");
        const firstNameInput = document.getElementById("firstNameInput");
        const lastNameInput = document.getElementById("lastNameInput");
        const phoneInput = document.getElementById("phoneInput");
        const telegramInput = document.getElementById("telegramInput");
        const vkInput = document.getElementById("vkInput");
        const positionInput = document.getElementById("positionInput");
        const reliabilityInput = document.getElementById("reliabilityInput");
        const deleteEmployeeBtn = document.getElementById("deleteEmployeeBtn");
        let editingEmployeeId = null;

        const openPanel = () => modal.classList.remove("hidden");
        const closePanel = () => modal.classList.add("hidden");
        const resetForm = () => {
          firstNameInput.value = "";
          lastNameInput.value = "";
          phoneInput.value = "";
          telegramInput.value = "";
          vkInput.value = "";
          positionInput.value = "manager";
          reliabilityInput.value = "checking";
          deleteEmployeeBtn.style.display = "none";
          deleteEmployeeBtn.disabled = true;
          deleteEmployeeBtn.textContent = "Удалить сотрудника";
        };

        const openForCreate = () => {
          editingEmployeeId = null;
          panelTitle.textContent = "Добавить сотрудника";
          resetForm();
          openPanel();
        };

        const openForEdit = (employeeId) => {
          const employee = state.employees.find((x) => String(x.id) === String(employeeId));
          if (!employee) {
            status.className = "status error";
            status.textContent = "Сотрудник не найден";
            return;
          }

          editingEmployeeId = employee.id;
          panelTitle.textContent = "Редактировать сотрудника";
          firstNameInput.value = employee.firstName || "";
          lastNameInput.value = employee.lastName || "";
          phoneInput.value = employee.phone || "";
          telegramInput.value = employee.telegramContact || "";
          vkInput.value = employee.vkContact || "";
          positionInput.value = employee.position || "manager";
          reliabilityInput.value = employee.reliability || "checking";
          deleteEmployeeBtn.style.display = "inline-block";
          deleteEmployeeBtn.disabled = !!employee.isProtected;
          deleteEmployeeBtn.textContent = employee.isProtected
            ? "Удаление запрещено"
            : "Удалить сотрудника";
          openPanel();
        };

        document.getElementById("openAddEmployeeBtn").addEventListener("click", openForCreate);
        document.getElementById("closeEmployeePanelBtn").addEventListener("click", closePanel);
        modal.addEventListener("click", (event) => {
          if (event.target === modal) closePanel();
        });
        panel.addEventListener("click", (event) => event.stopPropagation());
        phoneInput.addEventListener("focus", () => {
          if (!phoneInput.value.trim()) {
            phoneInput.value = "+7";
          }
        });
        phoneInput.addEventListener("blur", () => {
          const digits = onlyDigits(phoneInput.value);
          if (!digits || digits === "7") {
            phoneInput.value = "";
          }
        });
        phoneInput.addEventListener("input", () => {
          phoneInput.value = applyPhoneMask(phoneInput.value);
        });

        document.getElementById("saveEmployeeBtn").addEventListener("click", async () => {
          const firstName = firstNameInput.value.trim();
          const lastName = lastNameInput.value.trim();
          const normalizedPhone = normalizePhone(phoneInput.value);
          const telegramContact = normalizeTelegramContact(telegramInput.value);
          const vkContact = vkInput.value.trim();
          const position = positionInput.value;
          const reliability = reliabilityInput.value;

          if (firstName.length < 3 || lastName.length < 3) {
            status.className = "status error";
            status.textContent = "Имя и фамилия должны быть минимум по 3 символа";
            return;
          }

          if (normalizedPhone === null) {
            status.className = "status error";
            status.textContent = "Телефон должен быть в формате +7 999 999-99-99 (11 цифр, начиная с 7)";
            return;
          }

          try {
            const method = editingEmployeeId ? "PUT" : "POST";
            const endpoint = editingEmployeeId
              ? `/api/employees/${editingEmployeeId}`
              : "/api/employees";

            await api(endpoint, {
              method,
              body: JSON.stringify({
                firstName,
                lastName,
                phone: normalizedPhone || "",
                telegramContact,
                vkContact,
                position,
                reliability
              })
            });

            status.className = "status ok";
            status.textContent = editingEmployeeId ? "Сотрудник обновлен" : "Сотрудник добавлен";
            closePanel();
            renderEmployeesBase();
          } catch (error) {
            status.className = "status error";
            status.textContent = mapEmployeeApiError(error);
          }
        });

        for (const editBtn of screen.querySelectorAll("[data-edit-id]")) {
          editBtn.addEventListener("click", () => openForEdit(editBtn.dataset.editId));
        }

        deleteEmployeeBtn.addEventListener("click", async () => {
          if (!editingEmployeeId || deleteEmployeeBtn.disabled) return;
          try {
            await api(`/api/employees/${editingEmployeeId}`, { method: "DELETE" });
            status.className = "status ok";
            status.textContent = "Сотрудник удален";
            closePanel();
            renderEmployeesBase();
          } catch (error) {
            status.className = "status error";
            status.textContent = error.message;
          }
        });
      }

      function dayNameFromIso(iso) {
        const [y, m, d] = iso.split("-").map(Number);
        const dt = new Date(Date.UTC(y, m - 1, d));
        return dayNames[dt.getUTCDay()];
      }

      function ruDate(iso) {
        const [y, m, d] = iso.split("-");
        return `${d}.${m}.${y}`;
      }

      function employeeOptionsHtml() {
        return state.employees
          .map((emp) => `<option value="${escapeHtml(emp.fullName)}"></option>`)
          .join("");
      }

      function createRowAutoSaver(locationCode) {
        const timers = new Map();
        return (tr) => {
          const date = tr.dataset.date;
          if (!date) return;

          const get = (name) => tr.querySelector(`[data-f='${name}']`)?.value ?? "";
          const payload = {
            executor1: get("executor1").trim(),
            executor2: get("executor2").trim(),
            rate1: Number(get("rate1") || 0),
            rate2: Number(get("rate2") || 0),
            deductions: Number(get("deductions") || 0),
            bonuses: Number(get("bonuses") || 0)
          };

          const status = document.getElementById("scheduleStatus");
          status.className = "status";
          status.textContent = `Сохраняем ${ruDate(date)}...`;

          clearTimeout(timers.get(date));
          const timer = setTimeout(async () => {
            try {
              await api(`/api/schedule/${locationCode}/${date}`, {
                method: "PUT",
                body: JSON.stringify(payload)
              });
              status.className = "status ok";
              status.textContent = `Сохранено: ${ruDate(date)}`;
            } catch (error) {
              status.className = "status error";
              status.textContent = `Ошибка сохранения: ${error.message}`;
            }
          }, 550);

          timers.set(date, timer);
        };
      }

      async function renderSchedule() {
        await loadEmployees();
        screen.innerHTML = `<p class="muted">Загружаем график...</p>`;

        try {
          const data = await api(
            `/api/schedule/${state.selectedLocation.code}?month=${state.selectedMonth}`
          );
          const shifts = data.shifts || [];
          const employeeOptions = employeeOptionsHtml();

          const rows = shifts
            .map(
              (row) => `
                <tr data-date="${row.date}">
                  <td class="day">${dayNameFromIso(row.date)}</td>
                  <td>${ruDate(row.date)}</td>
                  <td><input type="text" list="employeesList" data-f="executor1" value="${escapeHtml(
                    row.executor1 || ""
                  )}" /></td>
                  <td><input type="text" list="employeesList" data-f="executor2" value="${escapeHtml(
                    row.executor2 || ""
                  )}" /></td>
                  <td><input type="number" min="0" step="100" data-f="rate1" value="${Number(
                    row.rate1 || 0
                  )}" /></td>
                  <td><input type="number" min="0" step="100" data-f="rate2" value="${Number(
                    row.rate2 || 0
                  )}" /></td>
                  <td><input type="number" min="0" step="100" data-f="deductions" value="${Number(
                    row.deductions || 0
                  )}" /></td>
                  <td><input type="number" min="0" step="100" data-f="bonuses" value="${Number(
                    row.bonuses || 0
                  )}" /></td>
                </tr>
              `
            )
            .join("");

          screen.innerHTML = `
            <div class="row">
              <button class="button secondary" id="backLocationsBtn">К пунктам</button>
            </div>
            <h2 class="mt12">${escapeHtml(state.selectedLocation.title)}</h2>
            <div class="row mt12">
              <label>
                <span class="muted">Месяц</span>
                <input id="monthInput" type="month" value="${escapeHtml(state.selectedMonth)}" />
              </label>
            </div>
            <p id="scheduleStatus" class="status mt8"></p>
            <datalist id="employeesList">${employeeOptions}</datalist>
            <div class="table-wrap mt12">
              <table>
                <thead>
                  <tr>
                    <th>День</th>
                    <th>Дата</th>
                    <th>Исполнитель1</th>
                    <th>Исполнитель2</th>
                    <th>Ставка И1</th>
                    <th>Ставка И2</th>
                    <th>Удержания</th>
                    <th>Доплаты</th>
                  </tr>
                </thead>
                <tbody>${rows}</tbody>
              </table>
            </div>
          `;

          document.getElementById("backLocationsBtn").addEventListener("click", renderLocations);
          document.getElementById("monthInput").addEventListener("change", () => {
            const month = document.getElementById("monthInput").value;
            if (/^\d{4}-\d{2}$/.test(month)) {
              state.selectedMonth = month;
              renderSchedule();
            }
          });

          const autosave = createRowAutoSaver(state.selectedLocation.code);
          for (const input of screen.querySelectorAll("tbody input")) {
            input.addEventListener("input", () => autosave(input.closest("tr")));
            input.addEventListener("change", () => autosave(input.closest("tr")));
          }
        } catch (error) {
          screen.innerHTML = `
            <p class="status error">Ошибка загрузки графика: ${escapeHtml(error.message)}</p>
            <div class="mt12"><button class="button secondary" id="backLocationsBtn">Назад</button></div>
          `;
          document.getElementById("backLocationsBtn").addEventListener("click", renderLocations);
        }
      }

      initApp();
    </script>
  </body>
</html>
