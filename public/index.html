<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PVZ Service</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      :root {
        --bg: #f3f6fb;
        --card: #ffffff;
        --line: #e3eaf4;
        --text: #162033;
        --muted: #66748c;
        --primary: #0f3b75;
        --primary-dark: #0b2f5d;
        --danger: #b42318;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        color: var(--text);
        background: linear-gradient(180deg, #f8faff 0%, #f1f5fb 100%);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        overscroll-behavior-y: none;
      }

      .wrap {
        max-width: none;
        margin: 0 auto;
        padding: 10px;
        min-height: 100dvh;
      }

      .card {
        background: var(--card);
        border-radius: 18px;
        padding: 16px;
        padding-bottom: 88px;
        border: 1px solid #e7edf7;
        box-shadow: 0 8px 26px rgba(22, 37, 63, 0.08);
        min-height: calc(100dvh - 20px);
      }

      h1 { margin: 0; font-size: 24px; }
      h2 { margin: 0; font-size: 20px; letter-spacing: 0.01em; }

      .mt8 { margin-top: 8px; }
      .mt12 { margin-top: 12px; }
      .mt16 { margin-top: 16px; }

      .muted { color: var(--muted); }

      .row {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }

      .button {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 15px;
        cursor: pointer;
        color: #fff;
        background: var(--primary);
      }

      .button:hover { background: var(--primary-dark); }
      .button.secondary { background: #334155; }
      .button.danger { background: var(--danger); }
      .button.disabled,
      .button:disabled {
        background: #94a3b8;
        cursor: not-allowed;
      }

      .back-icon-btn {
        width: 42px;
        height: 42px;
        border: 1px solid #cfd7e3;
        border-radius: 12px;
        background: #fff;
        display: grid;
        place-items: center;
        padding: 0;
        cursor: pointer;
      }

      .back-icon-btn img {
        width: 20px;
        height: 20px;
        object-fit: contain;
      }

      .menu-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 8px;
      }

      .dash-user {
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 14px;
        align-items: center;
        border: 1px solid #dbe4f1;
        border-radius: 16px;
        padding: 14px;
        background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
        box-shadow: 0 4px 14px rgba(24, 44, 78, 0.06);
        cursor: pointer;
      }

      .dash-avatar {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid #e8eef7;
        display: grid;
        place-items: center;
        font-size: 34px;
        font-weight: 700;
        background: linear-gradient(145deg, #d8b4fe, #a855f7);
        color: #fff;
      }

      .dash-arrow {
        width: 18px;
        height: 18px;
        object-fit: contain;
        opacity: 0.65;
      }

      .dash-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #22c55e;
        display: inline-block;
      }

      .overview-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .overview-card {
        border: 1px solid #e2e9f4;
        border-radius: 16px;
        padding: 14px;
        background: #f8fbff;
        box-shadow: 0 3px 10px rgba(20, 37, 69, 0.04);
      }

      .overview-card h3 {
        margin: 0;
        font-size: 15px;
        font-weight: 700;
        line-height: 1.25;
      }

      .overview-card .big {
        margin-top: 10px;
        font-size: 28px;
        font-weight: 800;
        line-height: 1.1;
        letter-spacing: -0.02em;
      }

      .overview-card.blue { background: #f1f6ff; }
      .overview-card.green { background: #f4f8ff; }
      .overview-card.purple { background: #f3f8ff; }

      .quick-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .quick-btn {
        border: 1px solid #d6deea;
        border-radius: 14px;
        background: #fff;
        padding: 12px 10px;
        color: #1f2937;
        cursor: pointer;
        text-align: center;
        font-size: 15px;
      }

      .warn-banner {
        border: 1px solid #e0e8f5;
        border-radius: 16px;
        background: #f7faff;
        padding: 14px;
      }

      .profile-hero {
        border-radius: 16px;
        padding: 16px;
        background: linear-gradient(120deg, #2563eb, #7c3aed);
        color: #fff;
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 12px;
        align-items: center;
      }

      .profile-hero .dash-avatar {
        width: 84px;
        height: 84px;
        border: 2px solid #fff;
      }

      .profile-badge {
        margin-top: 8px;
        display: inline-block;
        border: 1px solid #93c5fd;
        border-radius: 999px;
        padding: 4px 10px;
        background: rgba(255, 255, 255, 0.12);
      }

      .settings-list {
        border: 1px solid #d6deea;
        border-radius: 14px;
        background: #fff;
        overflow: hidden;
      }

      .settings-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        padding: 12px;
        border-bottom: 1px solid #e4eaf3;
      }

      .settings-row:last-child {
        border-bottom: 0;
      }

      .inline-arrow {
        width: 14px;
        height: 14px;
        object-fit: contain;
      }

      .open-arrow-btn {
        width: 34px;
        height: 34px;
        border: 1px solid #cfd7e3;
        border-radius: 10px;
        background: #fff;
        display: grid;
        place-items: center;
        cursor: pointer;
        padding: 0;
      }

      .open-arrow-btn img {
        width: 14px;
        height: 14px;
        object-fit: contain;
      }

      .location-btn-inner {
        width: 100%;
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 10px;
      }

      .location-btn-arrow {
        width: 14px;
        height: 14px;
        object-fit: contain;
        filter: brightness(0) invert(1);
        opacity: 0.95;
      }

      .bottom-nav {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 60;
        background: rgba(244, 248, 255, 0.96);
        backdrop-filter: blur(8px);
        border-top: 1px solid #dce5f3;
        padding: 7px 10px calc(7px + env(safe-area-inset-bottom));
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 6px;
      }

      .bottom-nav-btn {
        border: 0;
        border-radius: 12px;
        background: transparent;
        color: #74839b;
        font-size: 12px;
        font-weight: 500;
        padding: 4px 6px 3px;
        text-align: center;
        cursor: pointer;
        display: grid;
        justify-items: center;
        gap: 3px;
      }

      .bottom-nav-btn.active {
        color: #1f5cb8;
        background: #e9f1ff;
      }

      .bottom-nav-btn.disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .bottom-nav-icon {
        width: 20px;
        height: 20px;
        object-fit: contain;
        filter: brightness(0) saturate(100%) invert(42%) sepia(11%) saturate(647%)
          hue-rotate(173deg) brightness(94%) contrast(88%);
      }

      .bottom-nav-icon.employees {
        width: 24px;
        height: 24px;
      }

      .bottom-nav-btn.active .bottom-nav-icon {
        filter: brightness(0) saturate(100%) invert(28%) sepia(84%) saturate(1308%)
          hue-rotate(194deg) brightness(95%) contrast(92%);
      }

      .bottom-nav-label {
        line-height: 1.1;
        white-space: nowrap;
      }

      .location-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 8px;
      }

      .location-btn {
        text-align: left;
        min-height: 62px;
      }
      .location-btn.wb { background: #6d28d9; }
      .location-btn.wb:hover { background: #5b21b6; }
      .location-btn.ozon { background: #1d4ed8; }
      .location-btn.ozon:hover { background: #1e40af; }

      .profile-box {
        display: flex;
        gap: 12px;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px;
        background: #f9fbff;
      }

      .avatar {
        width: 58px;
        height: 58px;
        border-radius: 50%;
        object-fit: cover;
        border: 1px solid #b7c3d4;
        flex: 0 0 auto;
      }

      .avatar.placeholder {
        display: grid;
        place-items: center;
        font-weight: 700;
        background: #dce7f5;
      }

      input[type="text"],
      input[type="number"],
      input[type="month"],
      input[type="date"],
      input[type="tel"],
      select {
        width: 100%;
        border: 1px solid #c5ced8;
        border-radius: 8px;
        padding: 7px 8px;
        font-size: 14px;
      }

      .table-wrap {
        width: 100%;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 10px;
      }

      .schedule-mobile {
        display: grid;
        gap: 10px;
      }

      .schedule-card {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px;
        background: #fff;
      }

      .schedule-card-head {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        align-items: center;
        font-weight: 600;
      }

      .schedule-date-wrap {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .card-toggle {
        width: 28px;
        height: 28px;
        border: 1px solid #c5ced8;
        background: #fff;
        border-radius: 50%;
        display: grid;
        place-items: center;
        cursor: pointer;
        padding: 0;
      }

      .card-toggle.open {
        background: #eef2f7;
      }

      .card-toggle img {
        width: 16px;
        height: 16px;
        object-fit: contain;
        pointer-events: none;
      }

      .schedule-card-grid {
        margin-top: 8px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .schedule-card-details.hidden {
        display: none;
      }

      .adjust-list {
        display: grid;
        gap: 8px;
      }

      .adjust-item {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 8px;
        background: #fff;
      }

      .adjust-item-head {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .adjust-item-desc {
        margin-top: 4px;
        color: var(--muted);
        font-size: 12px;
      }

      .adjust-item-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 8px;
      }

      .finance-list {
        display: grid;
        gap: 8px;
      }

      .finance-row {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 0;
        background: #fff;
      }

      .finance-amount {
        font-weight: 700;
        white-space: nowrap;
      }

      .state-pill {
        display: inline-block;
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 12px;
        font-weight: 700;
      }

      .state-pill.closed {
        background: #dcfce7;
        color: #166534;
      }

      .state-pill.pending {
        background: #fef3c7;
        color: #92400e;
      }

      .state-pill.advance {
        background: #dbeafe;
        color: #1e40af;
      }

      .finance-summary {
        width: 100%;
        border: 0;
        background: transparent;
        padding: 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        cursor: pointer;
      }

      .finance-summary-left {
        min-width: 0;
      }

      .finance-summary-name {
        font-weight: 600;
      }

      .finance-summary-name .state-pill {
        margin-left: 6px;
      }

      .finance-summary-right {
        display: flex;
        align-items: center;
        gap: 8px;
        flex: 0 0 auto;
      }

      .finance-toggle-icon {
        width: 14px;
        height: 14px;
        object-fit: contain;
      }

      .finance-details {
        border-top: 1px solid var(--line);
        padding: 8px 10px 10px;
        color: var(--muted);
        font-size: 13px;
        display: grid;
        gap: 4px;
      }

      .finance-pay-row {
        margin-top: 6px;
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 8px;
        align-items: center;
      }

      .finance-history-list {
        display: grid;
        gap: 8px;
      }

      .finance-history-item {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 8px;
        background: #fff;
        font-size: 13px;
      }

      .finance-history-actions {
        margin-top: 8px;
        display: flex;
        justify-content: flex-end;
      }


      .finance-details.hidden {
        display: none;
      }

      .panel-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }

      .icon-button {
        width: 34px;
        height: 34px;
        border: 1px solid #c5ced8;
        border-radius: 10px;
        background: #fff;
        display: grid;
        place-items: center;
        cursor: pointer;
        padding: 0;
      }

      .icon-button img {
        width: 17px;
        height: 17px;
        object-fit: contain;
      }

      table {
        width: 100%;
        min-width: 940px;
        border-collapse: collapse;
        background: #fff;
      }

      th, td {
        border: 1px solid var(--line);
        padding: 7px;
        vertical-align: middle;
      }

      th {
        background: #f7f9fc;
        white-space: nowrap;
      }

      td.day { font-weight: 600; }

      .status {
        font-size: 14px;
        min-height: 18px;
      }

      .status.ok { color: #1d9f60; }
      .status.error { color: var(--danger); }

      .employees-list {
        display: grid;
        gap: 8px;
      }

      .employee-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 9px 10px;
        background: #fafcff;
      }

      .employee-meta {
        font-size: 13px;
        color: var(--muted);
      }

      .employee-main {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .employee-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        object-fit: cover;
        border: 1px solid #c5ced8;
        flex: 0 0 auto;
      }

      .employee-avatar.placeholder {
        display: grid;
        place-items: center;
        background: #dce7f5;
        font-size: 13px;
        font-weight: 700;
      }

      .badge {
        display: inline-block;
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 12px;
        font-weight: 600;
        margin-left: 6px;
      }

      .badge.reliable { background: #dff7e8; color: #157a3f; }
      .badge.checking { background: #fff4cc; color: #7a5600; }
      .badge.borderline { background: #ffe0e0; color: #9b1c1c; }

      .employees-form {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 8px;
      }

      .modal {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.45);
        display: grid;
        place-items: center;
        padding: 12px;
        z-index: 50;
      }

      .modal.hidden {
        display: none;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px;
        background: #f8fbff;
        width: min(760px, 100%);
        max-height: calc(100dvh - 32px);
        overflow: auto;
      }

      .panel.hidden {
        display: none;
      }

      .panel-title {
        margin: 0;
        font-size: 16px;
      }

      .app-title.hidden {
        display: none;
      }

      @media (max-width: 640px) {
        .wrap { padding: 0; }
        .card {
          padding: 10px;
          padding-bottom: 86px;
          min-height: 100dvh;
          border-radius: 0;
        }
        h1 { font-size: 22px; }
        .employee-row {
          grid-template-columns: 1fr;
        }
        .overview-grid,
        .quick-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1 id="appTitle" class="app-title">PVZ Service</h1>
        <div id="screen" class="mt12"></div>
      </div>
    </div>
    <nav id="bottomNav" class="bottom-nav"></nav>

    <script>
      const tg = window.Telegram?.WebApp;
      const APP_VERSION = "v2.8";
      if (tg) {
        tg.ready();
        tg.expand();
        tg.disableVerticalSwipes?.();
      }

      const dayNames = [
        "Воскресенье",
        "Понедельник",
        "Вторник",
        "Среда",
        "Четверг",
        "Пятница",
        "Суббота"
      ];

      const positions = {
        owner: "Владелец",
        owner_manager: "Управляющий",
        senior_manager: "Старший менеджер",
        manager: "Менеджер",
        intern: "Стажер"
      };

      const reliabilities = {
        reliable: "Надежный",
        checking: "Проверяется",
        borderline: "На грани увольнения"
      };
      const userRoles = {
        SUPERADMIN: "Гл. Админ",
        ADMIN: "Админ",
        PARTICIPANT: "Участник"
      };
      const monthNamesRu = [
        "Январь",
        "Февраль",
        "Март",
        "Апрель",
        "Май",
        "Июнь",
        "Июль",
        "Август",
        "Сентябрь",
        "Октябрь",
        "Ноябрь",
        "Декабрь"
      ];
      const deductionRules = [
        { code: "mess", title: "Беспорядок", fixed: -300, hint: "-300 рублей" },
        { code: "acceptance", title: "Приёмка", variable: true, hint: "Введите сумму удержания" },
        { code: "returns", title: "Возвраты", variable: true, hint: "Введите сумму удержания" },
        { code: "defect", title: "Брак", variable: true, hint: "Введите сумму удержания" },
        { code: "swap", title: "Подмена", variable: true, hint: "Введите сумму удержания" }
      ];
      const bonusRules = [
        { code: "urgent", title: "Экстренная замена", variable: true, hint: "Введите сумму доплаты" },
        { code: "inventory", title: "Инвентаризация", variable: true, hint: "Введите сумму доплаты" },
        { code: "general_cleaning", title: "Генеральная уборка", variable: true, hint: "Введите сумму доплаты" },
        { code: "basic_cleaning", title: "Базовая уборка после другого сотрудника", fixed: 300, hint: "+300 рублей" }
      ];

      const state = {
        telegramUser: null,
        user: null,
        telegramId: null,
        locations: [],
        employees: [],
        selectedLocation: null,
        selectedMonth: "",
        avatarNonce: String(Date.now()),
        scheduleViewMode: null,
        activeTab: "home"
      };

      const screen = document.getElementById("screen");
      const appTitle = document.getElementById("appTitle");
      const bottomNav = document.getElementById("bottomNav");

      function setAppTitle(value) {
        if (!value) {
          appTitle.textContent = "";
          appTitle.classList.add("hidden");
          return;
        }
        appTitle.textContent = value;
        appTitle.classList.remove("hidden");
      }

      function showAccessDenied() {
        const message = "Недостаточно прав для раздела Сотрудники";
        if (typeof tg?.showAlert === "function") {
          tg.showAlert(message);
          return;
        }
        window.alert(message);
      }

      function renderBottomNav(active = state.activeTab) {
        state.activeTab = active;
        const employeesLocked = !canManageEmployees();
        bottomNav.innerHTML = `
          <button class="bottom-nav-btn ${active === "home" ? "active" : ""}" data-tab="home">
            <img class="bottom-nav-icon" src="/icons/nav-home.png" alt="Главная" />
            <span class="bottom-nav-label">Главная</span>
          </button>
          <button class="bottom-nav-btn ${active === "schedule" ? "active" : ""}" data-tab="schedule">
            <img class="bottom-nav-icon" src="/icons/nav-schedule.png" alt="График" />
            <span class="bottom-nav-label">График</span>
          </button>
          <button class="bottom-nav-btn ${active === "employees" ? "active" : ""} ${employeesLocked ? "disabled" : ""}" data-tab="employees" ${employeesLocked ? "aria-disabled='true'" : ""}>
            <img class="bottom-nav-icon employees" src="/icons/nav-employees.png" alt="Сотрудники" />
            <span class="bottom-nav-label">Сотрудники</span>
          </button>
          <button class="bottom-nav-btn ${active === "profile" ? "active" : ""}" data-tab="profile">
            <img class="bottom-nav-icon" src="/icons/nav-profile.png" alt="Профиль" />
            <span class="bottom-nav-label">Профиль</span>
          </button>
        `;
        for (const btn of bottomNav.querySelectorAll("[data-tab]")) {
          btn.addEventListener("click", () => {
            const tab = btn.dataset.tab;
            if (tab === "home") {
              renderMain();
              return;
            }
            if (tab === "schedule") {
              renderLocations();
              return;
            }
            if (tab === "employees") {
              if (!canManageEmployees()) {
                showAccessDenied();
                return;
              }
              renderEmployeesBase();
              return;
            }
            if (tab === "profile") {
              renderProfile();
            }
          });
        }
      }

      function canManageEmployees() {
        return state.user?.role === "ADMIN" || state.user?.role === "SUPERADMIN";
      }

      function canEditSchedule() {
        return state.user?.role === "ADMIN" || state.user?.role === "SUPERADMIN";
      }

      function isPhoneClient() {
        const platform = String(tg?.platform || "").toLowerCase();
        if (platform === "ios" || platform === "android") return true;
        return window.matchMedia("(max-width: 860px)").matches;
      }

      async function ensureDesktopFullscreenForSchedule() {
        if (isPhoneClient()) return;
        try {
          if (typeof tg?.requestFullscreen === "function") {
            tg.requestFullscreen();
            return;
          }
        } catch {}

        try {
          if (!document.fullscreenElement && document.documentElement.requestFullscreen) {
            await document.documentElement.requestFullscreen();
          }
        } catch {}
      }

      function canEditEmployeeFromList(employee) {
        if (!state.user) return false;
        if (state.user.role === "SUPERADMIN") return true;
        if (state.user.role === "ADMIN") {
          return (employee?.accessRole || "PARTICIPANT") === "PARTICIPANT";
        }
        return false;
      }

      function withAvatarCacheBust(url, nonce = state.avatarNonce) {
        const raw = String(url || "").trim();
        if (!raw) return "";
        const sep = raw.includes("?") ? "&" : "?";
        return `${raw}${sep}v=${encodeURIComponent(nonce)}`;
      }

      function monthNow() {
        const now = new Date();
        return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;
      }

      function getTelegramUser() {
        const user = tg?.initDataUnsafe?.user;
        if (!user?.id) return null;
        const fullName = [user.first_name, user.last_name].filter(Boolean).join(" ").trim();
        return {
          telegramId: String(user.id),
          fullName: fullName || user.username || "Unknown User",
          username: user.username ? `@${user.username}` : "",
          photoUrl: user.photo_url || ""
        };
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      async function api(path, options = {}) {
        const headers = {
          "Content-Type": "application/json",
          ...(options.headers || {})
        };
        if (state.telegramId) headers["x-telegram-id"] = state.telegramId;

        const response = await fetch(path, { ...options, headers });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(data?.message || data?.error || "Ошибка API");
        }
        return data;
      }

      async function loadEmployees() {
        const data = await api("/api/employees");
        state.employees = data.employees || [];
      }

      async function loadEmployeesSafe() {
        try {
          await loadEmployees();
        } catch (error) {
          const message = String(error?.message || "");
          if (
            message.includes("Недостаточно прав") ||
            message.includes("Insufficient permissions") ||
            message.includes("Forbidden")
          ) {
            state.employees = [];
            return;
          }
          throw error;
        }
      }

            return;
          }

          state.telegramUser = tgUser;
          const login = await api("/api/auth/login", {

            })

      async function renderMain() {
        setAppTitle("PVZ Service");
        const photo = withAvatarCacheBust(state.telegramUser?.photoUrl || "");
        const initials = (state.user?.fullName || "?")
          .split(" ")
          .filter(Boolean)
          .slice(0, 2)
          .map((w) => w[0]?.toUpperCase() || "")
          .join("");
        const todayIso = new Date(Date.now() - new Date().getTimezoneOffset() * 60 * 1000)
          .toISOString()
          .slice(0, 10);
        let shiftText = "Выходной";
        let overviewShift = "—";
        let overviewStatus = "Выходной";
        let todayCardTitle = "Сегодня выходной";
        let upcomingCaption = "Нет запланированных смен";
        let todayTeamTitle = "Сегодня у вас нет смены";
        let todayTeamSub = "Пока вы не назначены на смену";
        let emptyShiftLines = ["Свободных смен на ближайшие 3 дня нет"];
        const formatUpcomingDate = (isoDate) => {
          const value = String(isoDate || "").trim();
          if (!/^\d{4}-\d{2}-\d{2}$/.test(value)) return "";
          if (value === todayIso) return "Сегодня";
          const tomorrow = new Date(`${todayIso}T00:00:00`);
          tomorrow.setDate(tomorrow.getDate() + 1);
          const tomorrowIso = tomorrow.toISOString().slice(0, 10);
          if (value === tomorrowIso) {
            const [, month, day] = value.match(/^(\d{4})-(\d{2})-(\d{2})$/) || [];
            return `Завтра (${day}.${month})`;
          }
          const dateObj = new Date(`${value}T00:00:00`);
          return dateObj.toLocaleDateString("ru-RU", { day: "numeric", month: "long" });
        };
        const addDaysIso = (isoDate, days) => {
          const match = String(isoDate || "").match(/^(\d{4})-(\d{2})-(\d{2})$/);
          if (!match) return isoDate;
          const year = Number(match[1]);
          const month = Number(match[2]);
          const day = Number(match[3]);
          const utc = new Date(Date.UTC(year, month - 1, day + Number(days || 0)));
          const y = String(utc.getUTCFullYear());
          const m = String(utc.getUTCMonth() + 1).padStart(2, "0");
          const d = String(utc.getUTCDate()).padStart(2, "0");
          return `${y}-${m}-${d}`;
        };
        try {
          const [todayData, upcomingData] = await Promise.all([
            api(`/api/schedule/me/today?date=${todayIso}`),
            api(`/api/schedule/me/upcoming?fromDate=${todayIso}&limit=4`)
          ]);
          const assignments = Array.isArray(todayData.assignments) ? todayData.assignments : [];
          if (assignments.length === 1) {
            const one = assignments[0];
            const time = `${one.workStart || "14:00"} - ${one.workEnd || "22:00"}`;
            shiftText = "Работаю";
            overviewShift = time;
            overviewStatus = "Рабочий день";
            todayCardTitle = "Сегодня рабочий день";
            const coworker = String(one.coworkerName || "").trim();
            if (coworker) {
              todayTeamTitle = `Сегодня ваша смена с ${coworker}`;
              todayTeamSub = one.locationTitle || "Ваша смена";
            } else {
              todayTeamTitle = "Сегодня вы одни на смене";
              todayTeamSub = one.locationTitle || "Ваша смена";
            }
          } else if (assignments.length > 1) {
            const first = assignments[0];
            const firstTime = `${first.workStart || "14:00"} - ${first.workEnd || "22:00"}`;
            shiftText = "Работаю";
            overviewShift = `${assignments.length} смены`;
            overviewStatus = firstTime;
            todayCardTitle = "Сегодня рабочий день";
            const coworker = String(first.coworkerName || "").trim();
            if (coworker) {
              todayTeamTitle = `Сегодня ваша смена с ${coworker}`;
              todayTeamSub = `И еще ${assignments.length - 1} смен(ы)`;
            } else {
              todayTeamTitle = "Сегодня вы одни на смене";
              todayTeamSub = `И еще ${assignments.length - 1} смен(ы)`;
            }
          }
          const upcomingShifts = Array.isArray(upcomingData.shifts) ? upcomingData.shifts : [];
          const labels = upcomingShifts
            .map((item) => {
              const dateLabel = formatUpcomingDate(item?.date);
              const locationTitle = String(item?.locationTitle || "").trim();
              if (!dateLabel || !locationTitle) return "";
              return `${dateLabel} — ${locationTitle}`;
            })
            .filter(Boolean);
          if (labels.length) {
            upcomingCaption = labels.join(", ");
          }

          const nextDates = [todayIso, addDaysIso(todayIso, 1), addDaysIso(todayIso, 2)];
          const monthsToLoad = [...new Set(nextDates.map((date) => String(date).slice(0, 7)))];
          const scheduleResponses = await Promise.all(
            (state.locations || []).flatMap((loc) =>
              monthsToLoad.map((month) =>
                api(`/api/schedule/${loc.code}?month=${month}`)
                  .then((data) => ({
                    locationCode: loc.code,
                    month,
                    shifts: Array.isArray(data?.shifts) ? data.shifts : []
                  }))
                  .catch(() => ({
                    locationCode: loc.code,
                    month,
                    shifts: []
                  }))
              )
            )
          );
          const scheduleMap = new Map(
            scheduleResponses.map((item) => [`${item.locationCode}:${item.month}`, item.shifts])
          );
          const emptyRowsByDate = new Map();
          const seenEmptyRows = new Set();
          for (const date of nextDates) {
            const monthKey = String(date).slice(0, 7);
            for (const loc of state.locations || []) {
              const shifts = scheduleMap.get(`${loc.code}:${monthKey}`) || [];
              const row = shifts.find((item) => String(item?.date) === date);
              const e1 = String(row?.executor1 || "").trim();
              const e2 = String(row?.executor2 || "").trim();
              if (!e1 && !e2) {
                const dateLabel = formatUpcomingDate(date);
                const key = `${dateLabel}::${loc.title}`;
                if (!seenEmptyRows.has(key)) {
                  seenEmptyRows.add(key);
                  const current = emptyRowsByDate.get(dateLabel) || [];
                  current.push(loc.title);
                  emptyRowsByDate.set(dateLabel, current);
                }
              }
            }
          }
          const groupedRows = [...emptyRowsByDate.entries()].map(
            ([dateLabel, locations]) => `${dateLabel} — ${locations.join(", ")}`
          );
          if (groupedRows.length) {
            emptyShiftLines = groupedRows;
          }
        } catch {
          // fallback значения уже заданы
        }
        const emptyShiftLinesHtml = emptyShiftLines
          .map((line) => `<div class="muted mt8">${escapeHtml(line)}</div>`)
          .join("");
        screen.innerHTML = `
          <div class="dash-user mt12" id="openProfileFromMain">
            ${
              photo
                ? `<img class="dash-avatar" src="${escapeHtml(photo)}" alt="avatar" />`
                : `<div class="dash-avatar">${escapeHtml(initials || "?")}</div>`
            }
            <div>
              <div style="font-size:20px;"><strong>${escapeHtml((state.user.fullName || "").split(" ")[0] || state.user.fullName)}</strong></div>
              <div class="muted mt8">Роль: <strong>${escapeHtml(userRoles[state.user.role] || state.user.role)}</strong></div>
              <div class="muted mt8"><span class="dash-dot"></span> ${escapeHtml(shiftText)}</div>
            </div>
            <img class="dash-arrow" src="/icons/right-arrow.png" alt="Открыть" />
          </div>
          <h2 class="mt16">Обзор</h2>
          <div class="overview-grid mt12">
            <div class="overview-card blue">
              <h3>${escapeHtml(todayCardTitle)}</h3>
              <div class="big">${escapeHtml(overviewShift)}</div>
              <div class="muted mt8">${escapeHtml(todayTeamTitle)}</div>
              <div class="muted mt8">${escapeHtml(todayTeamSub)}</div>
            </div>
            <div class="overview-card green">
              <h3>Ваши ближайшие смены</h3>
              <div class="muted mt8">${escapeHtml(upcomingCaption)}</div>

          <div class="warn-banner mt12">
            <div><strong>Ближайшие свободные смены</strong></div>

        renderBottomNav("home");
        document.getElementById("openProfileFromMain")?.addEventListener("click", () => {
          renderProfile();
        });
      }

      function mapEmployeeApiError(error) {
        if (!error?.message) return "Не удалось сохранить сотрудника";
        if (error.message.includes("phone") || error.message.includes("телефон")) {
          return "Некорректный номер телефона. Пример: +7 999 123-45-67";
        }
        return error.message;
      }

      function normalizeTelegramContact(value) {
        const raw = value.trim();
        if (!raw) return "";
        return raw.startsWith("@") ? raw : `@${raw}`;
      }

      function onlyDigits(value) {
        return String(value || "").replace(/\D/g, "");
      }

      function applyPhoneMask(value) {
        const digits = onlyDigits(value);
        if (!digits) return "";

        const normalized = `7${digits.startsWith("7") ? digits.slice(1) : digits}`;
        const cut = normalized.slice(0, 11);
        const p1 = cut.slice(1, 4);
        const p2 = cut.slice(4, 7);
        const p3 = cut.slice(7, 9);
        const p4 = cut.slice(9, 11);

        let out = "+7";
        if (p1) out += ` ${p1}`;
        if (p2) out += ` ${p2}`;
        if (p3) out += `-${p3}`;
        if (p4) out += `-${p4}`;
        return out;
      }

      function normalizePhone(value) {
        const masked = applyPhoneMask(value);
        const digits = onlyDigits(masked);
        if (!digits) return "";
        if (digits.length !== 11 || digits[0] !== "7") return null;
        return masked;
      }

      function dayNameFromIso(iso) {
        const [y, m, d] = iso.split("-").map(Number);
        const dt = new Date(Date.UTC(y, m - 1, d));
        return dayNames[dt.getUTCDay()];
      }

      function ruDate(iso) {
        const [y, m, d] = iso.split("-");
        return `${d}.${m}.${y}`;
      }

      function getMonthBounds(monthValue) {
        const match = String(monthValue || "").match(/^(\d{4})-(\d{2})$/);
        if (!match) {
          const now = new Date();
          const y = now.getFullYear();
          const m = now.getMonth() + 1;
          const mm = String(m).padStart(2, "0");
          return { start: `${y}-${mm}-01`, end: `${y}-${mm}-31` };
        }
        const year = Number(match[1]);
        const month = Number(match[2]);
        const lastDay = new Date(Date.UTC(year, month, 0)).getUTCDate();
        return {
          start: `${match[1]}-${match[2]}-01`,
          end: `${match[1]}-${match[2]}-${String(lastDay).padStart(2, "0")}`
        };
      }

      function formatMonthYear(monthValue) {
        const match = String(monthValue || "").match(/^(\d{4})-(\d{2})$/);
        if (!match) return "Выбрать месяц";
        const year = Number(match[1]);
        const monthIndex = Number(match[2]) - 1;
        return `${monthNamesRu[monthIndex] || "Месяц"} ${year}`;
      }

      function formatMoney(value) {
        const num = Number(value || 0);
        const abs = Math.abs(num).toLocaleString("ru-RU");
        if (num < 0) return `-${abs} ₽`;
        if (num > 0) return `+${abs} ₽`;
        return "0 ₽";
      }

      function formatMoneyUnsigned(value) {
        const num = Math.abs(Number(value || 0));
        return `${num.toLocaleString("ru-RU")} ₽`;
      }

      function formatPayoutBalance(value) {
        const num = Number(value || 0);
        const abs = Math.abs(num).toLocaleString("ru-RU");
        if (num < 0) return `-${abs} ₽`;
        return `${abs} ₽`;
      }

      function financeStateForRow({ balance, advance, paid }) {
        const bal = Number(balance || 0);
        const adv = Number(advance || 0);
        const pd = Number(paid || 0);
        if (Math.abs(bal) < 0.01) {
          return { cls: "closed", label: "Закрыто" };
        }
        if (adv > 0 && pd <= 0) {
          return { cls: "advance", label: "Аванс" };
        }
        return { cls: "pending", label: "Долг" };
      }

      function adjustButtonLabel(kind, value) {
        const labels = {

          deductions2: "Удержания И2",

        };
        return `${labels[kind] || "Сумма"}: ${formatMoney(value)}`;

      function employeeSelectOptionsHtml(selectedValue = "", disabledNames = new Set()) {
        const current = String(selectedValue || "").trim();
        const names = state.employees.map((emp) => String(emp.fullName || "").trim()).filter(Boolean);
        if (current && !names.includes(current)) {
          names.unshift(current);
        }
        const uniqueNames = [...new Set(names)];
        const disabledLookup = new Set(
          [...disabledNames].map((name) => String(name || "").trim().toLowerCase()).filter(Boolean)
        );
        return `
          <option value="">— Пусто —</option>
          ${uniqueNames
            .map(
              (name) => {
                const normalized = String(name || "").trim().toLowerCase();
                const isDisabled = normalized && disabledLookup.has(normalized) && current !== name;
                return `<option value="${escapeHtml(name)}" ${current === name ? "selected" : ""} ${
                  isDisabled ? "disabled" : ""
                }>${escapeHtml(name)}</option>`;
              }
            )
            .join("")}
        `;
      }

            return;
          }
          const payload = {
            executor1,
            executor2,
            rate1: Number(get("rate1") || 0),
            rate2: Number(get("rate2") || 0),
            deductions1: Number(get("deductions1") || 0),
            deductions2: Number(get("deductions2") || 0),
            bonuses1: Number(get("bonuses1") || 0),
            bonuses2: Number(get("bonuses2") || 0),
            deductions1Meta: (() => {
              try {
                const parsed = JSON.parse(tr.dataset.deductions1Meta || "[]");
                return Array.isArray(parsed) ? parsed : [];
              } catch {
                return [];
              }
            })(),
            deductions2Meta: (() => {

                const parsed = JSON.parse(tr.dataset.deductions2Meta || "[]");
                return Array.isArray(parsed) ? parsed : [];
              } catch {
                return [];

                return Array.isArray(parsed) ? parsed : [];
              } catch {
                return [];

                return Array.isArray(parsed) ? parsed : [];
              } catch {
                return [];
              }
            })()
          };

          status.className = "status";
          status.textContent = `Сохраняем ${ruDate(date)}...`;

          clearTimeout(timers.get(date));
          const timer = setTimeout(async () => {
            try {
              await api(`/api/schedule/${locationCode}/${date}`, {
                method: "PUT",
                body: JSON.stringify(payload)

              status.className = "status error";

          }, 550);

          timers.set(date, timer);
        };

                      <input type="hidden" data-f="deductions1" value="${Number(row.deductions1 || 0)}" />
                      <button data-shift-input="1" type="button" class="button secondary" data-adjust-open="deductions1">${adjustButtonLabel(
                        "deductions1",

                      )}</button>
