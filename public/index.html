<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PVZ Service</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      :root {
        --bg: #f2f4f8;
        --card: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --primary: #0f766e;
        --primary-hover: #0b5a54;
        --line: #d5dbe5;
        --ok: #1d9f60;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .wrap {
        max-width: 980px;
        margin: 0 auto;
        padding: 18px 12px 24px;
      }

      .card {
        background: var(--card);
        border-radius: 14px;
        padding: 16px;
        box-shadow: 0 10px 22px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0;
        font-size: 28px;
      }

      h2 {
        margin: 0;
        font-size: 21px;
      }

      .muted {
        color: var(--muted);
      }

      .mt8 { margin-top: 8px; }
      .mt12 { margin-top: 12px; }
      .mt16 { margin-top: 16px; }

      .row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .button {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 15px;
        cursor: pointer;
        background: var(--primary);
        color: #fff;
      }

      .button:hover {
        background: var(--primary-hover);
      }

      .button.secondary {
        background: #334155;
      }

      .button.success {
        background: var(--ok);
      }

      .grid-locations {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 10px;
      }

      .location-btn {
        padding: 14px;
        text-align: left;
      }

      .table-wrap {
        width: 100%;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 10px;
      }

      table {
        border-collapse: collapse;
        min-width: 1080px;
        width: 100%;
        background: #fff;
      }

      th, td {
        border: 1px solid var(--line);
        padding: 8px;
        vertical-align: middle;
      }

      th {
        background: #f8fafc;
        white-space: nowrap;
      }

      td.day {
        font-weight: 600;
      }

      input[type="text"],
      input[type="number"],
      input[type="month"] {
        width: 100%;
        padding: 7px 8px;
        border: 1px solid #c5ced8;
        border-radius: 8px;
        font-size: 14px;
      }

      .status {
        font-size: 14px;
        min-height: 20px;
      }

      .status.error {
        color: #b42318;
      }

      .status.ok {
        color: var(--ok);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>PVZ Service</h1>
        <div id="screen" class="mt16"></div>
      </div>
    </div>

    <script>
      const tg = window.Telegram?.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
      }

      const dayNames = [
        "Воскресенье",
        "Понедельник",
        "Вторник",
        "Среда",
        "Четверг",
        "Пятница",
        "Суббота"
      ];

      const state = {
        user: null,
        telegramId: null,
        locations: [],
        view: "loading",
        selectedLocation: null,
        selectedMonth: ""
      };

      const screen = document.getElementById("screen");

      function monthNow() {
        const now = new Date();
        return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;
      }

      function parseTelegramUser() {
        const user = tg?.initDataUnsafe?.user;
        if (!user?.id) {
          return null;
        }
        const fullName = [user.first_name, user.last_name].filter(Boolean).join(" ").trim();
        return {
          telegramId: String(user.id),
          fullName: fullName || user.username || "Unknown User"
        };
      }

      async function api(path, options = {}) {
        const headers = {
          "Content-Type": "application/json",
          ...(options.headers || {})
        };

        if (state.telegramId) {
          headers["x-telegram-id"] = state.telegramId;
        }

        const response = await fetch(path, {
          ...options,
          headers
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          const message = data?.message || data?.error || "Ошибка API";
          throw new Error(message);
        }
        return data;
      }

      function renderLoading(text) {
        state.view = "loading";
        screen.innerHTML = `<p class="muted">${text}</p>`;
      }

      function renderError(text) {
        screen.innerHTML = `
          <p class="status error">${text}</p>
          <div class="mt12">
            <button class="button" id="retryBtn">Повторить</button>
          </div>
        `;
        document.getElementById("retryBtn").addEventListener("click", initApp);
      }

      async function initApp() {
        try {
          renderLoading("Подключаемся...");

          const tgUser = parseTelegramUser();
          if (!tgUser) {
            renderError("Открой Mini App из Telegram, чтобы получить имя и роль.");
            return;
          }

          const login = await api("/api/auth/login", {
            method: "POST",
            body: JSON.stringify(tgUser)
          });

          state.user = login.user;
          state.telegramId = login.user.telegramId;
          state.selectedMonth = monthNow();

          const locationsData = await api("/api/schedule/locations");
          state.locations = locationsData.locations || [];

          renderMain();
        } catch (error) {
          renderError(`Не удалось загрузить данные: ${error.message}`);
        }
      }

      function renderMain() {
        state.view = "main";
        screen.innerHTML = `
          <h2>Главный экран</h2>
          <div class="mt12">
            <div><strong>Имя:</strong> ${state.user.fullName}</div>
            <div class="mt8"><strong>Роль:</strong> ${state.user.role}</div>
          </div>
          <div class="mt16">
            <button class="button" id="goScheduleBtn">График</button>
          </div>
        `;

        document.getElementById("goScheduleBtn").addEventListener("click", renderLocations);
      }

      function renderLocations() {
        state.view = "locations";

        const items = state.locations
          .map(
            (location) =>
              `<button class="button location-btn" data-code="${location.code}">${location.title}</button>`
          )
          .join("");

        screen.innerHTML = `
          <div class="row">
            <button class="button secondary" id="backMainBtn">Назад</button>
          </div>
          <h2 class="mt12">Выбор пункта</h2>
          <div class="grid-locations mt12">
            ${items}
          </div>
        `;

        document.getElementById("backMainBtn").addEventListener("click", renderMain);

        for (const btn of screen.querySelectorAll("[data-code]")) {
          btn.addEventListener("click", () => {
            const location = state.locations.find((item) => item.code === btn.dataset.code);
            if (location) {
              state.selectedLocation = location;
              renderSchedule();
            }
          });
        }
      }

      function dayNameFromIso(isoDate) {
        const [y, m, d] = isoDate.split("-").map(Number);
        const utc = new Date(Date.UTC(y, m - 1, d));
        return dayNames[utc.getUTCDay()];
      }

      function dateRuFromIso(isoDate) {
        const [y, m, d] = isoDate.split("-");
        return `${d}.${m}.${y}`;
      }

      function numberInputValue(value) {
        return Number(value || 0);
      }

      async function renderSchedule() {
        state.view = "schedule";
        renderLoading("Загружаем график...");

        try {
          const data = await api(
            `/api/schedule/${state.selectedLocation.code}?month=${state.selectedMonth}`
          );
          const rows = data.shifts || [];

          const rowsHtml = rows
            .map(
              (row) => `
              <tr data-date="${row.date}">
                <td class="day">${dayNameFromIso(row.date)}</td>
                <td>${dateRuFromIso(row.date)}</td>
                <td><input type="text" data-field="executor1" value="${row.executor1 || ""}" /></td>
                <td><input type="text" data-field="executor2" value="${row.executor2 || ""}" /></td>
                <td><input type="number" min="0" step="100" data-field="rate1" value="${numberInputValue(row.rate1)}" /></td>
                <td><input type="number" min="0" step="100" data-field="rate2" value="${numberInputValue(row.rate2)}" /></td>
                <td><input type="number" min="0" step="100" data-field="deductions" value="${numberInputValue(row.deductions)}" /></td>
                <td><input type="number" min="0" step="100" data-field="bonuses" value="${numberInputValue(row.bonuses)}" /></td>
                <td><button class="button success save-row-btn">Сохранить</button></td>
              </tr>
            `
            )
            .join("");

          screen.innerHTML = `
            <div class="row">
              <button class="button secondary" id="backLocationsBtn">К пунктам</button>
            </div>
            <h2 class="mt12">${state.selectedLocation.title}</h2>
            <div class="row mt12">
              <label style="display:block;">
                <span class="muted">Месяц</span>
                <input id="monthInput" type="month" value="${state.selectedMonth}" />
              </label>
              <button class="button" id="reloadMonthBtn">Показать</button>
            </div>
            <p id="pageStatus" class="status mt12"></p>
            <div class="table-wrap mt12">
              <table>
                <thead>
                  <tr>
                    <th>День</th>
                    <th>Дата</th>
                    <th>Исполнитель1</th>
                    <th>Исполнитель2</th>
                    <th>Ставка И1</th>
                    <th>Ставка И2</th>
                    <th>Удержания</th>
                    <th>Доплаты</th>
                    <th>Действие</th>
                  </tr>
                </thead>
                <tbody>
                  ${rowsHtml}
                </tbody>
              </table>
            </div>
          `;

          document.getElementById("backLocationsBtn").addEventListener("click", renderLocations);

          document.getElementById("reloadMonthBtn").addEventListener("click", () => {
            const month = document.getElementById("monthInput").value;
            if (/^\d{4}-\d{2}$/.test(month)) {
              state.selectedMonth = month;
              renderSchedule();
            }
          });

          for (const btn of screen.querySelectorAll(".save-row-btn")) {
            btn.addEventListener("click", async () => {
              const tr = btn.closest("tr");
              const date = tr.dataset.date;
              const get = (field) => tr.querySelector(`[data-field="${field}"]`)?.value ?? "";
              const payload = {
                executor1: get("executor1").trim(),
                executor2: get("executor2").trim(),
                rate1: Number(get("rate1") || 0),
                rate2: Number(get("rate2") || 0),
                deductions: Number(get("deductions") || 0),
                bonuses: Number(get("bonuses") || 0)
              };

              const status = document.getElementById("pageStatus");
              status.textContent = `Сохраняем ${dateRuFromIso(date)}...`;
              status.className = "status";

              try {
                await api(`/api/schedule/${state.selectedLocation.code}/${date}`, {
                  method: "PUT",
                  body: JSON.stringify(payload)
                });
                status.textContent = `Сохранено: ${dateRuFromIso(date)}`;
                status.className = "status ok";
              } catch (error) {
                status.textContent = `Ошибка сохранения: ${error.message}`;
                status.className = "status error";
              }
            });
          }
        } catch (error) {
          renderError(`Ошибка загрузки графика: ${error.message}`);
        }
      }

      initApp();
    </script>
  </body>
</html>
